<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mis Finanzas">
<title>Mis Finanzas</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a1a;--bg2:#12122a;--bg3:#0d1b2a;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.06);--text:#e0e0e0;--text2:#f0f0f0;--muted:#888;--dim:#666;--blue:#2D9CDB;--green:#27AE60;--red:#e74c3c;--orange:#e67e22;--purple:#9B51E0;--teal:#2A9D8F;--radius:12px;--radius-lg:16px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(145deg,var(--bg) 0%,var(--bg2) 50%,var(--bg3) 100%);color:var(--text);min-height:100vh;min-height:100dvh;overscroll-behavior:none}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
#app{max-width:480px;margin:0 auto;position:relative;padding-bottom:90px;min-height:100vh}
.header{padding:20px 16px 12px;border-bottom:1px solid var(--border);padding-top:max(20px,env(safe-area-inset-top,20px))}
.content{padding-top:12px;padding-bottom:20px}
.card{background:var(--card);border-radius:var(--radius-lg);padding:16px 18px;margin:0 16px 12px;border:1px solid var(--border)}
.btn{border:none;color:#fff;padding:12px 20px;border-radius:var(--radius);cursor:pointer;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .2s;-webkit-appearance:none}
.btn:hover{filter:brightness(1.1)}.btn:active{transform:scale(.97)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:6px 14px;font-size:14px}.btn-xs{padding:4px 10px;font-size:11px}
.btn-nav{padding:6px 10px;font-size:14px;background:rgba(255,255,255,0.08)}
.btn-full{width:100%;padding:14px;font-size:16px}
.input{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:12px 16px;color:var(--text2);font-size:16px;font-family:'DM Sans',sans-serif;width:100%;outline:none;-webkit-appearance:none;transition:border-color .2s}
.input:focus{border-color:rgba(45,156,219,0.5);box-shadow:0 0 0 3px rgba(45,156,219,0.1)}.input-big{font-size:24px;font-weight:700;text-align:center;padding:16px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(10,10,26,0.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:6px 2px calc(10px + env(safe-area-inset-bottom,0px));z-index:100}
.nav-tab{background:transparent;border:1px solid transparent;color:var(--dim);padding:5px 4px;border-radius:8px;cursor:pointer;font-size:9px;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;gap:1px;transition:all .2s;min-width:0}
.nav-tab.active{background:rgba(45,156,219,0.2);border-color:rgba(45,156,219,0.4);color:var(--blue)}
.nav-tab .icon{font-size:16px}
.overlay{position:fixed;inset:0;z-index:1000;background:rgba(10,10,30,0.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#1a1a2e;border-radius:20px;padding:24px 20px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto;border:1px solid rgba(255,255,255,0.08)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h2{font-size:17px;color:var(--text2);font-family:'Space Grotesk',sans-serif}
.modal-close{background:rgba(255,255,255,0.1);border:none;color:#aaa;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px}
.toast-container{position:fixed;top:max(16px,env(safe-area-inset-top,16px));right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:300px}
.toast{padding:12px 16px;border-radius:12px;color:#fff;font-size:13px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.25);animation:slideIn .3s ease}
.summary-grid{padding:0 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.progress-bar{background:rgba(255,255,255,0.06);border-radius:8px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:8px;transition:width .5s ease}
.progress-sm{height:6px;border-radius:6px}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.cat-btn{background:rgba(255,255,255,0.04);border:2px solid var(--border);border-radius:14px;padding:12px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s}
.cat-btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.12)}
.cat-btn .emoji{font-size:24px}.cat-btn .label{font-size:10px;color:var(--muted);font-weight:600;text-align:center}
.currency-toggle{display:flex;gap:8px;margin-bottom:12px}
.currency-btn{flex:1;padding:10px;font-size:14px;border-radius:var(--radius);cursor:pointer;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .2s;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.08);color:#fff}
.currency-btn:hover{background:rgba(255,255,255,0.12)}
.conversion-preview{text-align:center;margin-top:8px;font-size:14px;padding:8px 12px;border-radius:10px}
.limit-row,.tx-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;margin-bottom:8px;background:rgba(255,255,255,0.04);border-radius:12px;border:1px solid var(--border);transition:background .2s}
.limit-row:hover,.tx-row:hover{background:rgba(255,255,255,0.06)}
.tx-row{padding:14px 16px;animation:fadeIn .3s ease}
.hidden{display:none}.label-sm{font-size:12px;color:var(--muted);margin-bottom:6px;display:block}.label-xs{font-size:11px;text-transform:uppercase;letter-spacing:1px}
.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:24px}
.auth-box{width:100%;max-width:340px}
.auth-logo{font-size:48px;margin-bottom:8px}.auth-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;color:var(--text2);margin-bottom:4px}
.auth-sub{color:var(--muted);font-size:14px;margin-bottom:32px}
.auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--dim);font-size:12px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-link{color:var(--blue);cursor:pointer;font-size:14px}.auth-link:hover{text-decoration:underline}
.space-code{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;letter-spacing:6px;color:var(--blue);background:rgba(45,156,219,0.1);border:2px dashed rgba(45,156,219,0.3);border-radius:16px;padding:14px 20px;text-align:center;cursor:pointer;transition:background .2s}
.space-code:hover{background:rgba(45,156,219,0.15)}
.loading{animation:pulse 1.5s infinite;text-align:center;color:var(--muted);padding:40px}
.project-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s;background:var(--card)}
.project-card:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.1)}
.project-card:active{transform:scale(.98)}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin:8px 0}
.emoji-opt{font-size:22px;padding:6px;border-radius:8px;cursor:pointer;text-align:center;border:2px solid transparent;transition:all .15s}
.emoji-opt:hover,.emoji-opt.sel{background:rgba(255,255,255,0.1);border-color:var(--blue)}
.color-grid{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.color-opt{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.color-opt:hover,.color-opt.sel{border-color:#fff;transform:scale(1.15)}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bal-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;margin-bottom:8px;background:rgba(155,81,224,0.06);border-radius:12px;border:1px solid rgba(155,81,224,0.15)}
.bal-debt{background:rgba(45,156,219,0.06);border:1px solid rgba(45,156,219,0.15);border-radius:12px;padding:12px 16px;margin-bottom:8px}
.usdt-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;margin-bottom:8px;background:rgba(39,174,96,0.06);border-radius:12px;border:1px solid rgba(39,174,96,0.15)}
.split-member{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;border:2px solid var(--border);background:rgba(255,255,255,0.04);transition:all .2s;margin-bottom:6px}
.split-member.sel{border-color:var(--purple);background:rgba(155,81,224,0.12)}
.disp-cur-toggle{display:inline-flex;gap:3px;background:rgba(255,255,255,0.06);border-radius:10px;padding:3px}
.disp-cur-btn{padding:3px 10px;font-size:11px;border-radius:7px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--muted);background:transparent;transition:all .2s}
.disp-cur-btn.active{background:var(--blue);color:#fff}
.auto-tasa-btn{background:rgba(39,174,96,0.15);border:1px solid rgba(39,174,96,0.3);color:var(--green);padding:10px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;width:100%;margin-bottom:10px;transition:all .2s}
.auto-tasa-btn:hover{background:rgba(39,174,96,0.25)}
.auto-tasa-btn:disabled{opacity:.5;cursor:not-allowed}

/* DESKTOP 768px+ */
.desktop-sidebar{display:none}
@media(min-width:768px){
  #app{max-width:100% !important;padding-bottom:0 !important}
  #mainContent.desktop-main{display:flex;flex-direction:column;min-height:100vh;width:100%}
  .desktop-sidebar .sidebar-tab{display:flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;border-radius:8px;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--dim);font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap;flex-shrink:0}
  .desktop-sidebar .sidebar-tab:hover{background:rgba(255,255,255,0.05);color:var(--text)}
  .desktop-sidebar .sidebar-tab.active{background:rgba(45,156,219,0.15);border-color:rgba(45,156,219,0.3);color:var(--blue)}
  .desktop-sidebar .sidebar-tab .s-icon{font-size:16px}
  #mainContent.desktop-main>.desktop-right{display:flex;flex-direction:column;width:100%;min-height:100vh}
  #mainContent.desktop-main .header{padding:14px 32px 10px;border-bottom:none;flex-shrink:0}
  #mainContent.desktop-main .desktop-sidebar{display:flex;flex-direction:row;align-items:center;gap:2px;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border);padding:0 32px;height:46px;flex-shrink:0;overflow-x:auto}
  #mainContent.desktop-main .content{padding:24px 0 32px;overflow-y:auto;flex:1;max-width:900px;margin:0 auto;width:100%}
  #mainContent.desktop-main .bottom-nav{display:none !important}
  .card{margin:0 0 14px 0;padding:20px 22px}
  .summary-grid{padding:0;gap:14px}
  .cat-grid{grid-template-columns:repeat(5,1fr);gap:12px}
  .cat-btn{padding:14px 8px}
  .cat-btn .emoji{font-size:26px}
  .cat-btn .label{font-size:11px}
  .auth-screen{min-height:100vh;padding:40px 24px}
  .auth-box{max-width:440px}
  .auth-title{font-size:32px}
  .auth-logo{font-size:56px}
  .project-card{padding:20px 24px}
  .project-card:active{transform:none}
  .limit-row,.tx-row{padding:16px 22px}
  .modal{max-width:520px;padding:28px 24px}
  .input-big{font-size:28px;padding:18px}
  .input{font-size:15px}
  .btn-full{padding:13px;font-size:15px}
  .spaces-screen,.projects-screen{max-width:900px;margin:0 auto;padding:40px 32px}
  .spaces-screen .card,.projects-screen .card{padding:20px 22px}
  .currency-toggle{max-width:400px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
}
@media(min-width:1200px){
  #mainContent.desktop-main .content{max-width:960px}
  .cat-grid{grid-template-columns:repeat(6,1fr)}
  .desktop-sidebar .sidebar-tab{padding:8px 20px;font-size:14px}
  .spaces-screen,.projects-screen{max-width:960px}
}
</style>
</head>
<body>
<div id="app"><div id="toasts" class="toast-container"></div><div id="mainContent"></div></div>
<div id="modalOverlay" class="overlay hidden" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><h2 id="modalTitle"></h2><button class="modal-close" onclick="closeModal()">✕</button></div><div id="modalBody"></div></div></div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
// ═══ FIREBASE CONFIG ═══
const firebaseConfig={apiKey:"AIzaSyBzu0XXwfZe3kBqK04fVLxD3oXtnycySX0",authDomain:"fina-finanzas.firebaseapp.com",projectId:"fina-finanzas",storageBucket:"fina-finanzas.firebasestorage.app",messagingSenderId:"531084619166",appId:"1:531084619166:web:b3ac7addca9c5286263a8f"};
firebase.initializeApp(firebaseConfig);const auth=firebase.auth(),db=firebase.firestore();

// ═══ CONSTANTS ═══
const DEFAULT_CATEGORIES=[
  {id:"mercado",name:"Mercado",icon:"🛒",color:"#2D9CDB"},{id:"salidas",name:"Salidas / Delivery",icon:"🍔",color:"#F2994A"},
  {id:"terapia",name:"Terapia",icon:"🧠",color:"#BB6BD9"},{id:"anita",name:"Anita",icon:"💜",color:"#9B51E0"},
  {id:"manicurista",name:"Manicurista",icon:"💅",color:"#EB5757"},{id:"regalos",name:"Regalos",icon:"🎁",color:"#F2C94C"},
  {id:"seguro",name:"Seguro Médico",icon:"🏥",color:"#27AE60"},{id:"suscripciones",name:"Suscripciones",icon:"📱",color:"#6FCF97"},
  {id:"extras",name:"Extras / Imprevistos",icon:"⚡",color:"#E0E0E0"},{id:"viajes",name:"Viajes",icon:"✈️",color:"#56CCF2"},
  {id:"internet",name:"Internet",icon:"🌐",color:"#219EBC"},{id:"estacionamientos",name:"Estacionamientos",icon:"🅿️",color:"#8D99AE"},
  {id:"pichu",name:"Pichu",icon:"🐾",color:"#E76F51"},{id:"personales",name:"Gastos Personales",icon:"🧴",color:"#F4A261"},
  {id:"ahorros",name:"Ahorros e Inversiones",icon:"💰",color:"#2A9D8F"}
];
const EMOJI_OPTIONS=["🛒","🍔","🧠","💜","💅","🎁","🏥","📱","⚡","✈️","🌐","🅿️","🐾","🧴","💰","🏠","🚗","👶","🎓","💻","🎨","🎵","📦","🔧","☕","🍷","💊","👔","📚","🎮","🏋️","🐶"];
const COLOR_OPTIONS=["#2D9CDB","#F2994A","#BB6BD9","#9B51E0","#EB5757","#F2C94C","#27AE60","#6FCF97","#56CCF2","#219EBC","#8D99AE","#E76F51","#F4A261","#2A9D8F","#E0E0E0","#FF6B6B"];
const MONTHS_ES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
function getMonthKey(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}
function formatUSD(n){return fmtMoney(n)}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='';for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function projCurrency(){return currentProject?.currency||'usd'}
function fmtMoney(n){const d=userDisplayCurrency||projCurrency();const v=Number(n||0);if(d==='ves'&&tasaBCV)return`Bs. ${(v*tasaBCV).toFixed(2)}`;return`${d==='eur'||projCurrency()==='eur'?'€':'$'}${v.toFixed(2)}`}

// ═══ STATE ═══
let user=null,currentSpace=null,userSpaces=[];
let currentProject=null; // {id, name, icon, shared, ownerId, categories:[...]}
let spaceProjects=[];    // all projects in space
let currentMonth=getMonthKey(new Date()),currentView='dashboard';
let monthData={limits:{},transactions:[],income:[]};
let tasaBCV=null,selectedCat=null,expenseCurrency='usd',incomeCurrency='usd';
let deleteConfirmId=null,converterDir='usd-to-ves';
let userDisplayCurrency=null; // moneda preferida de visualización por usuario
let splitMode=false,splitWith={}; // para dividir gastos entre miembros
let unsubMonth=null,unsubSpace=null,unsubTasa=null,unsubProjects=null;
let appScreen='loading'; // loading|auth|register|spaces|projects|main

// ═══ HELPERS ═══
function getCat(id){return(currentProject?.categories||[]).find(c=>c.id===id)}
function getSpent(catId){return monthData.transactions.filter(t=>t.category===catId).reduce((s,t)=>s+t.amount,0)}
function totalBudget(){return(currentProject?.categories||[]).reduce((s,c)=>s+(monthData.limits[c.id]||0),0)}
function totalSpent(){return monthData.transactions.reduce((s,t)=>s+t.amount,0)}
function totalIncome(){return monthData.income.reduce((s,t)=>s+t.amount,0)}
function getPct(catId){const l=monthData.limits[catId]||0;return l===0?0:Math.min((getSpent(catId)/l)*100,100)}
function getBarColor(catId){const p=getPct(catId);if(p>=90)return'#e74c3c';if(p>=75)return'#e67e22';return getCat(catId)?.color||'#2D9CDB'}
function mLabel(){const[y,m]=currentMonth.split('-');return`${MONTHS_ES[parseInt(m)-1]} ${y}`}

// ═══ TOASTS ═══
function showToast(msg,color='var(--orange)'){const el=document.getElementById('toasts'),t=document.createElement('div');t.className='toast';t.style.background=color;t.innerHTML=msg;t.onclick=()=>t.remove();el.appendChild(t);setTimeout(()=>t.remove(),4000)}
function checkAlerts(catId,spent,limit){if(limit<=0)return;const p=(spent/limit)*100,cat=getCat(catId);if(p>=90)showToast(`<strong>⚠️ 90%</strong><div style="margin-top:4px;opacity:.9">${cat.name}: ${formatUSD(spent)} de ${formatUSD(limit)}</div>`,'#c0392b');else if(p>=75)showToast(`<strong>⚠️ 75%</strong><div style="margin-top:4px;opacity:.9">${cat.name}: ${formatUSD(spent)} de ${formatUSD(limit)}</div>`)}

// ═══ AUTH ═══
auth.onAuthStateChanged(u=>{user=u;if(u){appScreen='spaces';loadUserSpaces()}else{appScreen=localStorage.getItem('fina_onboarded')?'auth':'onboarding';renderApp()}});
async function doRegister(){const name=document.getElementById('regName')?.value?.trim(),email=document.getElementById('regEmail')?.value?.trim(),pass=document.getElementById('regPass')?.value;if(!name||!email||!pass)return showToast('Completa todos los campos');if(pass.length<6)return showToast('Mínimo 6 caracteres');try{const cred=await auth.createUserWithEmailAndPassword(email,pass);await cred.user.updateProfile({displayName:name});await db.collection('users').doc(cred.user.uid).set({name,email,createdAt:firebase.firestore.FieldValue.serverTimestamp()})}catch(e){showToast(e.message,'var(--red)')}}
async function doLogin(){const email=document.getElementById('loginEmail')?.value?.trim(),pass=document.getElementById('loginPass')?.value;if(!email||!pass)return showToast('Completa email y contraseña');try{await auth.signInWithEmailAndPassword(email,pass)}catch(e){showToast('Email o contraseña incorrectos','var(--red)')}}
function doLogout(){detachAll();auth.signOut();currentSpace=null;currentProject=null}

// ═══ SPACES ═══
async function loadUserSpaces(){try{console.log('🔍 Loading spaces for UID:',user.uid);const snap=await db.collection('spaces').where('memberUids','array-contains',user.uid).get();console.log('📦 Spaces found:',snap.size);snap.docs.forEach(d=>console.log('  Space:',d.id,d.data().name));userSpaces=snap.docs.map(d=>({id:d.id,...d.data()}))}catch(e){console.error('❌ loadUserSpaces error:',e);userSpaces=[]}appScreen='spaces';renderApp()}

function attachSpaceListeners(){if(unsubSpace)unsubSpace();if(unsubProjects)unsubProjects();if(unsubTasa)unsubTasa();
  unsubSpace=db.collection('spaces').doc(currentSpace.id).onSnapshot(s=>{if(s.exists)currentSpace={id:s.id,...s.data()}});
  unsubTasa=db.collection('spaces').doc(currentSpace.id).collection('config').doc('tasa').onSnapshot(s=>{tasaBCV=s.exists?s.data().value:null;if(appScreen==='main')renderMainContent()});
  unsubProjects=db.collection('spaces').doc(currentSpace.id).collection('projects').onSnapshot(snap=>{
    spaceProjects=snap.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.shared||p.ownerId===user.uid);
    if(currentProject){const updated=spaceProjects.find(p=>p.id===currentProject.id);if(updated)currentProject=updated}
    if(appScreen==='projects')renderApp();if(appScreen==='main')renderMainContent()
  })
}

async function createProject(){
  const name=document.getElementById('projName')?.value?.trim();
  const shared=document.getElementById('projShared')?.checked;
  if(!name)return showToast('Ponle un nombre al proyecto');
  const ownedProjects=spaceProjects.filter(p=>p.ownerId===user.uid).length;
  if(ownedProjects>=FREE_MAX_PROJECTS){return openUpgradeModal('El plan gratuito permite 3 proyectos por espacio. Actualiza para proyectos ilimitados.')}
  const currency=document.querySelector('input[name="projCur"]:checked')?.value||'usd';
  try{await db.collection('spaces').doc(currentSpace.id).collection('projects').add({name,icon:'📂',shared:!!shared,currency,ownerId:user.uid,categories:[],createdAt:firebase.firestore.FieldValue.serverTimestamp()})}catch(e){showToast(e.message,'var(--red)')}
}

async function createGeneralProject(){
  try{await db.collection('spaces').doc(currentSpace.id).collection('projects').add({name:'General',icon:'📊',shared:true,currency:'usd',ownerId:user.uid,categories:DEFAULT_CATEGORIES,createdAt:firebase.firestore.FieldValue.serverTimestamp()})}catch(e){showToast(e.message,'var(--red)')}
}

async function deleteProject(pid){
  if(!confirm('¿Eliminar este proyecto y todos sus datos?'))return;
  try{
    const months=await db.collection('spaces').doc(currentSpace.id).collection('projects').doc(pid).collection('months').get();
    const batch=db.batch();months.forEach(d=>batch.delete(d.ref));
    batch.delete(db.collection('spaces').doc(currentSpace.id).collection('projects').doc(pid));
    await batch.commit();
    if(currentProject?.id===pid){currentProject=null;if(unsubMonth)unsubMonth();appScreen='projects';renderApp()}
  }catch(e){showToast(e.message,'var(--red)')}
}

async function fetchBCVAuto(){
  const btn=document.getElementById('bcvAutoBtn');
  if(btn){btn.disabled=true;btn.textContent='⏳ Conectando...'}
  try{
    const r=await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    const tasa=data.promedio;
    if(!tasa||isNaN(tasa))throw new Error('respuesta inválida');
    const inp=document.getElementById('tasaModalInput')||document.getElementById('tasaInput');
    if(inp)inp.value=tasa.toFixed(2);
    showToast(`✓ Tasa BCV: Bs. ${tasa.toFixed(2)}`,'var(--green)');
    if(btn){btn.disabled=false;btn.textContent='✓ Tasa detectada — guarda para activar'}
  }catch(e){
    showToast('No se pudo obtener la tasa. Ingrésala manualmente.','var(--red)');
    if(btn){btn.disabled=false;btn.textContent='🔄 Reintentar'}
  }
}

// ═══ BALANCES ═══
function computeOwes(){
  const owes={};
  monthData.transactions.filter(t=>t.splitWith?.length&&t.paidBy).forEach(tx=>{
    const all=[tx.paidBy,...tx.splitWith].filter((v,i,a)=>a.indexOf(v)===i);
    const share=tx.amount/all.length;
    all.filter(uid=>uid!==tx.paidBy).forEach(debtor=>{
      if(!owes[debtor])owes[debtor]={};
      if(!owes[debtor][tx.paidBy])owes[debtor][tx.paidBy]=0;
      owes[debtor][tx.paidBy]+=share;
    });
  });
  // nettear deudas mutuas
  Object.keys(owes).forEach(a=>{Object.keys(owes[a]).forEach(b=>{
    if(owes[b]&&owes[b][a]){
      const diff=owes[a][b]-owes[b][a];
      if(diff>0){owes[a][b]=diff;owes[b][a]=0}else{owes[b][a]=Math.abs(diff);owes[a][b]=0}
    }
  })});
  return owes;
}
function renderBalances(){
  if(!currentProject?.shared)return`<div style="padding:20px 16px;text-align:center;color:var(--muted);margin-top:40px"><div style="font-size:32px;margin-bottom:10px">👥</div>Solo disponible en proyectos compartidos</div>`;
  const sharedTxs=monthData.transactions.filter(t=>t.splitWith?.length);
  if(!sharedTxs.length)return`<div style="padding:0 16px"><h3 style="font-size:16px;color:var(--text2);margin:8px 0 16px">⚖️ Deudas — ${mLabel()}</h3><div class="card" style="margin:0;text-align:center;color:var(--muted)"><div style="font-size:28px;margin-bottom:8px">⚖️</div>Sin gastos divididos este mes.<br><span style="font-size:13px">Usa "Dividir" al registrar un gasto.</span></div></div>`;
  const owes=computeOwes();
  const members=currentSpace?.members||[];
  const me=user.uid;
  let rows='';
  // Deudas que me involucran
  members.forEach(debtor=>{
    if(!owes[debtor.uid])return;
    Object.entries(owes[debtor.uid]).forEach(([credUid,amt])=>{
      if(amt<0.01)return;
      const cred=members.find(m=>m.uid===credUid);
      const isMeDebtor=debtor.uid===me;
      const isMeCred=credUid===me;
      if(!isMeDebtor&&!isMeCred)return;
      rows+=`<div class="bal-debt"><div style="display:flex;justify-content:space-between;align-items:center"><div><span style="font-size:13px;color:var(--text)">${isMeDebtor?'🧾 Tú debes':('🧾 '+debtor.name+' debe')}</span><span style="font-size:13px;color:var(--muted)"> a ${isMeCred?'ti':(cred?.name||credUid)}</span></div><span style="font-size:16px;font-weight:700;color:var(--purple)">${formatUSD(amt)}</span></div>${isMeDebtor?`<div style="font-size:11px;color:var(--dim);margin-top:4px">💜 Puedes saldar con USDT en la pestaña ₮</div>`:''}</div>`;
    });
  });
  if(!rows)rows=`<div style="text-align:center;color:var(--green);font-size:14px;padding:20px">✓ Sin deudas pendientes</div>`;
  // Resumen de gastos compartidos del mes
  const total=sharedTxs.reduce((s,t)=>s+t.amount,0);
  return`<div style="padding:0 16px"><h3 style="font-size:16px;color:var(--text2);margin:8px 0 16px">⚖️ Deudas — ${mLabel()}</h3><div class="card" style="margin:0 0 16px 0"><div style="display:flex;justify-content:space-between;align-items:center"><div><div class="label-xs" style="color:var(--purple)">Total dividido</div><div style="font-size:20px;font-weight:700;color:var(--text2)">${formatUSD(total)}</div></div><div style="font-size:12px;color:var(--muted)">${sharedTxs.length} gasto${sharedTxs.length>1?'s':''}</div></div></div>${rows}</div>`
}

async function addUSDTTransfer(){
  const toUid=document.getElementById('usdtTo')?.value||'';
  const toText=document.getElementById('usdtToText')?.value?.trim()||'';
  const toName=toUid?((currentSpace?.members||[]).find(m=>m.uid===toUid)?.name||toUid):toText;
  if(!toUid&&!toText)return showToast('Indica el destinatario');
  const amt=parseFloat(document.getElementById('usdtAmt')?.value);
  if(!amt||isNaN(amt)||amt<=0)return showToast('Monto inválido');
  const hash=document.getElementById('usdtHash')?.value?.trim()||'';
  const note=document.getElementById('usdtNote')?.value?.trim()||'';
  const net=document.getElementById('usdtNet')?.value?.trim()||'';
  const transfer={id:Date.now(),fromUid:user.uid,fromName:user.displayName||user.email,toUid,toName,amount:amt,txHash:hash,note:note+(net?` (${net})`:''),date:new Date().toISOString()};

  await saveMonthData();
  showToast(`₮ ${amt} USDT enviado a ${toName}`,'var(--green)');
  renderMainContent()
}

async function addTransaction(){const inp=document.getElementById('expenseAmount'),note=document.getElementById('expenseNote');if(!selectedCat||!inp?.value)return;const raw=parseFloat(inp.value);if(isNaN(raw))return;const isV=expenseCurrency==='ves';if(isV&&!tasaBCV)return;const amt=isV?raw/tasaBCV:raw;const sw=splitMode?Object.keys(splitWith):[];monthData.transactions.push({id:Date.now(),category:selectedCat,amount:amt,originalAmount:raw,originalCurrency:expenseCurrency,tasaUsed:isV?tasaBCV:null,note:note?.value||'',date:new Date().toISOString(),addedBy:user.displayName||user.email,paidBy:user.uid,splitWith:sw});checkAlerts(selectedCat,getSpent(selectedCat),monthData.limits[selectedCat]||0);await saveMonthData();selectedCat=null;expenseCurrency='usd';splitMode=false;splitWith={};currentView='dashboard';renderApp()}
async function addIncome(){const inp=document.getElementById('incomeAmount'),note=document.getElementById('incomeNote');if(!inp?.value)return;const raw=parseFloat(inp.value);if(isNaN(raw))return;const isV=incomeCurrency==='ves';const isE=incomeCurrency==='eur';if(isV&&!tasaBCV)return;const amt=isV?raw/tasaBCV:raw;monthData.income.push({id:Date.now(),amount:amt,originalAmount:raw,originalCurrency:incomeCurrency,tasaUsed:isV?tasaBCV:null,note:note?.value||'',date:new Date().toISOString(),addedBy:user.displayName||user.email});await saveMonthData();incomeCurrency='usd';currentView='dashboard';renderApp()}
async function deleteTx(id){if(deleteConfirmId===id){monthData.transactions=monthData.transactions.filter(t=>t.id!==id);deleteConfirmId=null;await saveMonthData();renderMainContent()}else{deleteConfirmId=id;renderMainContent()}}

function openEditIncomeModal(id){const inc=monthData.income.find(i=>i.id===id);if(!inc)return;document.getElementById('modalTitle').textContent='Editar Ingreso';document.getElementById('modalBody').innerHTML=`<div style="margin-bottom:12px"><label class="label-sm">Monto</label><input type="text" inputmode="decimal" id="editIncAmount" class="input input-big" value="${inc.amount}"></div><div style="margin-bottom:16px"><label class="label-sm">Concepto</label><input type="text" id="editIncNote" class="input" value="${inc.note||''}"></div><button class="btn btn-full" style="background:var(--green)" onclick="saveEditIncome(${id})">Guardar</button>`;document.getElementById('modalOverlay').classList.remove('hidden');setTimeout(()=>document.getElementById('editIncAmount')?.focus(),100)}
async function saveEditIncome(id){const a=parseFloat(document.getElementById('editIncAmount')?.value),n=document.getElementById('editIncNote')?.value||'';if(isNaN(a)||a<=0)return showToast('Monto inválido');const inc=monthData.income.find(i=>i.id===id);if(inc){inc.amount=a;inc.note=n;await saveMonthData();closeModal();renderMainContent()}}

function renderMainContent(){
  const c=document.getElementById('innerContent');if(!c)return;
  const cats=currentProject?.categories||[];
  switch(currentView){
    case'dashboard':c.innerHTML=renderDashboard(cats);break;
    case'add':c.innerHTML=renderAdd(cats);break;
    case'income':c.innerHTML=renderIncomeView();break;
    case'limits':c.innerHTML=renderLimits(cats);break;
    case'history':c.innerHTML=renderHistory();break;
    case'converter':c.innerHTML=renderConverter();break;
    case'categories':c.innerHTML=renderCategoriesView(cats);break;
    case'members':c.innerHTML=renderMembers();break;
    case'balances':c.innerHTML=renderBalances();break;
    case'usdt':c.innerHTML=renderUSDT();break;
  }
  let tabs=[{id:'dashboard',icon:'📊',label:'Inicio'},{id:'add',icon:'💸',label:'Gasto'},{id:'income',icon:'💵',label:'Ingreso'},{id:'limits',icon:'📏',label:'Límites'},{id:'history',icon:'📋',label:'Historial'},{id:'categories',icon:'🏷️',label:'Categ.'},{id:'members',icon:'👥',label:'Equipo'}];

  if(currentProject?.shared)tabs.push({id:'balances',icon:'⚖️',label:'Deudas'});
  tabs.push({id:'usdt',icon:'₮',label:'USDT'});
  const sb=document.getElementById('desktopSidebar');if(sb)sb.innerHTML=tabs.map(t=>`<button class="sidebar-tab ${currentView===t.id?'active':''}" onclick="setView('${t.id}')"><span class="s-icon">${t.icon}</span><span>${t.label}</span></button>`).join('');
  document.getElementById('bottomNav').innerHTML=tabs.map(t=>`<button class="nav-tab ${currentView===t.id?'active':''}" onclick="setView('${t.id}')"><span class="icon">${t.icon}</span><span>${t.label}</span></button>`).join('');
}

// ── DASHBOARD ──
function renderDashboard(cats){
  const tb=totalBudget(),ts=totalSpent(),ti=totalIncome(),avail=tb-ts;
  const bp=tb>0?Math.min((ts/tb)*100,100):0,bc=(ts/tb)>.9?'var(--red)':(ts/tb)>.75?'var(--orange)':'var(--blue)';
  const catHTML=cats.length?cats.map(cat=>{const sp=getSpent(cat.id),lim=monthData.limits[cat.id]||0,pct=getPct(cat.id),col=getBarColor(cat.id);
    return`<div class="card" style="cursor:pointer" onclick="selectCatAndGo('${cat.id}')"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${lim>0?8:0}px"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">${cat.icon}</span><div><div style="font-size:14px;font-weight:600;color:var(--text2)">${cat.name}</div><div style="font-size:12px;color:var(--muted)">${lim>0?`Límite: ${formatUSD(lim)}`:'Sin límite'}</div></div></div><div style="text-align:right"><div style="font-size:16px;font-weight:700;color:${col}">${formatUSD(sp)}</div>${lim>0?`<div style="font-size:11px;color:var(--muted)">Queda: ${formatUSD(lim-sp)}</div>`:''}</div></div>${lim>0?`<div class="progress-bar progress-sm"><div class="progress-fill" style="width:${pct}%;background:${col}"></div></div>`:''}</div>`}).join('')
    :`<div class="card" style="text-align:center;color:var(--muted)"><div style="font-size:28px;margin-bottom:8px">🏷️</div>No hay categorías aún.<br><span class="auth-link" onclick="setView('categories')">Agregar categorías</span></div>`;
  // Tasa BCV card - only show if active
  const dispToggle=dispCurToggleHTML();
  const tasaCard=tasaBCV?`<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px"><div><div class="label-xs" style="color:var(--orange)">🇻🇪 Tasa BCV</div><div style="font-size:18px;font-weight:600;color:var(--text2);margin-top:2px">Bs. ${tasaBCV}</div></div><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">${dispToggle}<input type="number" id="tasaInput" class="input" style="width:76px;padding:8px 10px;font-size:14px" placeholder="78.50"><button class="btn" style="background:rgba(39,174,96,.3);padding:8px 10px;font-size:13px;border:1px solid rgba(39,174,96,.4)" onclick="fetchBCVAuto()" title="Auto-detectar">🔄</button><button class="btn" style="background:rgba(45,156,219,.3);padding:8px 12px;font-size:13px;border:1px solid rgba(45,156,219,.4)" onclick="saveTasa()">✓</button><button class="btn" style="background:rgba(231,76,60,.15);padding:8px 10px;font-size:13px;color:var(--red);border:1px solid rgba(231,76,60,.2)" onclick="removeTasa()">✕</button></div></div></div>`:`<div class="card" style="text-align:center"><button class="btn" style="background:rgba(255,255,255,0.06);padding:10px 20px;font-size:13px;color:var(--muted)" onclick="openTasaModal()">🇻🇪 Activar Bolívares (tasa BCV)</button></div>`;
  return`<div class="summary-grid"><div class="card" style="margin:0;background:linear-gradient(135deg,rgba(39,174,96,.18),rgba(39,174,96,.05))"><div class="label-xs" style="color:var(--green);margin-bottom:4px">Ingresos</div><div style="font-size:22px;font-weight:700;color:var(--green)">${formatUSD(ti)}</div></div><div class="card" style="margin:0;background:linear-gradient(135deg,rgba(231,76,60,.18),rgba(231,76,60,.05))"><div class="label-xs" style="color:var(--red);margin-bottom:4px">Gastado</div><div style="font-size:22px;font-weight:700;color:var(--red)">${formatUSD(ts)}</div></div></div><div class="card" style="background:linear-gradient(135deg,rgba(45,156,219,.15),rgba(45,156,219,.04));border-color:rgba(45,156,219,.15)"><div style="display:flex;justify-content:space-between;align-items:center"><div><div class="label-xs" style="color:var(--blue);margin-bottom:4px">Presupuesto</div><div style="font-size:24px;font-weight:700;color:var(--text2)">${formatUSD(tb)}</div></div><div style="text-align:right"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">Disponible</div><div style="font-size:22px;font-weight:700;color:${avail<0?'var(--red)':'var(--blue)'}">${formatUSD(avail)}</div></div></div>${tb>0?`<div class="progress-bar" style="margin-top:14px"><div class="progress-fill" style="width:${bp}%;background:${bc}"></div></div>`:''}</div>${tasaCard}<div style="padding:0 16px 8px"><h3 class="label-xs" style="color:var(--muted);margin:12px 0 10px">Categorías</h3></div>${catHTML}`

function renderAdd(cats){
  if(!cats.length)return`<div style="padding:20px 16px;text-align:center;color:var(--muted)"><div style="font-size:40px;margin-bottom:12px">🏷️</div><div style="font-size:16px;margin-bottom:16px">Primero agrega categorías a este proyecto</div><button class="btn btn-full" style="background:var(--blue)" onclick="setView('categories')">Ir a Categorías</button></div>`;
  const btns=cats.map(c=>`<button class="cat-btn" style="${selectedCat===c.id?`background:${c.color}30;border-color:${c.color}`:''}" onclick="selectCat('${c.id}')"><span class="emoji">${c.icon}</span><span class="label" style="${selectedCat===c.id?`color:${c.color}`:''}">${c.name}</span></button>`).join('');
  let info='';if(selectedCat){const cat=getCat(selectedCat),sp=getSpent(selectedCat),lim=monthData.limits[selectedCat]||0;info=`<div style="background:${cat.color}15;border:1px solid ${cat.color}40;border-radius:14px;padding:14px;margin-bottom:14px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:18px">${cat.icon}</span><span style="font-weight:600;color:${cat.color}">${cat.name}</span></div><div style="font-size:13px;color:#aaa">Gastado: <strong style="color:var(--text2)">${formatUSD(sp)}</strong>${lim>0?` de ${formatUSD(lim)} — Queda: <strong style="color:${lim-sp<0?'var(--red)':'var(--green)'}">${formatUSD(lim-sp)}</strong>`:''}</div></div>`}
  const isV=expenseCurrency==='ves',dis=!selectedCat||(isV&&!tasaBCV);
  const bsBtn=tasaBCV?`<button class="currency-btn" style="${expenseCurrency==='ves'?'background:var(--orange);border-color:var(--orange)':''}" onclick="setExpCurrency('ves')">🇻🇪 Bs.</button>`:'';
  return`<div style="padding:0 16px"><h3 style="font-size:16px;color:var(--text2);margin:8px 0 16px">Registrar Gasto</h3><div class="cat-grid">${btns}</div>${info}<div style="margin-bottom:12px"><label class="label-sm">Moneda</label><div class="currency-toggle"><button class="currency-btn" style="${expenseCurrency==='usd'?'background:var(--blue);border-color:var(--blue)':''}" onclick="setExpCurrency('usd')">🇺🇸 USD</button><button class="currency-btn" style="${expenseCurrency==='eur'?'background:var(--green);border-color:var(--green)':''}" onclick="setExpCurrency('eur')">🇪🇺 EUR</button>${bsBtn}</div><label class="label-sm">Monto (${isV?'Bs.':expenseCurrency==='eur'?'EUR':'USD'})</label><input type="text" inputmode="decimal" id="expenseAmount" class="input input-big" placeholder="0.00" oninput="updateExpP()"><div id="expP"></div></div><div style="margin-bottom:12px"><label class="label-sm">Nota (opcional)</label><input type="text" id="expenseNote" class="input" placeholder="Descripción..."></div>${splitSectionHTML()}<button class="btn btn-full" style="background:${dis?'#333':'var(--blue)'}" onclick="addTransaction()" ${dis?'disabled':''}>💸 Registrar Gasto</button></div>`
}
function updateExpP(){const el=document.getElementById('expP'),inp=document.getElementById('expenseAmount');if(!el||!inp?.value||!tasaBCV){if(el)el.innerHTML='';return}const a=parseFloat(inp.value);if(isNaN(a)){el.innerHTML='';return}el.innerHTML=expenseCurrency==='ves'?`<div class="conversion-preview" style="background:rgba(45,156,219,.1)"><span style="color:var(--blue)">= <strong>${formatUSD(a/tasaBCV)}</strong> <span style="color:var(--muted);font-size:12px">(tasa ${tasaBCV})</span></span></div>`:`<div class="conversion-preview" style="background:rgba(230,126,34,.1)"><span style="color:var(--orange)">≈ Bs. ${(a*tasaBCV).toFixed(2)}</span></div>`}

// ── INCOME ──
function renderIncomeView(){
  const isV=incomeCurrency==='ves';let hist='';
  if(monthData.income.length){hist=`<div style="margin-top:20px"><h4 style="font-size:13px;color:var(--muted);margin-bottom:10px">Ingresos del mes</h4>${monthData.income.map(i=>{const ves=i.originalCurrency==='ves'?`<span style="color:var(--orange);margin-left:4px">(Bs.${i.originalAmount?.toFixed(2)}@${i.tasaUsed})</span>`:i.originalCurrency==='eur'?`<span style="color:var(--green);margin-left:4px">(€${i.originalAmount?.toFixed(2)})</span>`:'';const by=i.addedBy?`<span style="color:var(--purple);margin-left:4px">· ${i.addedBy}</span>`:'';const del=deleteConfirmId===('inc_'+i.id)?`<div style="display:flex;gap:4px"><button class="btn btn-xs" style="background:var(--red)" onclick="confirmDeleteIncome(${i.id})">Sí</button><button class="btn btn-xs" style="background:rgba(255,255,255,.1)" onclick="cancelDelete()">No</button></div>`:`<div style="display:flex;gap:4px;flex-shrink:0"><button style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:4px" onclick="openEditIncomeModal(${i.id})">✏️</button><button style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:4px" onclick="deleteConfirmId='inc_'+${i.id};renderMainContent()">🗑</button></div>`;return`<div class="card" style="margin:0 0 8px 0;display:flex;justify-content:space-between;align-items:center"><div style="flex:1"><div style="font-size:14px;font-weight:600;color:var(--green)">${formatUSD(i.amount)}</div><div style="font-size:11px;color:var(--muted)">${i.note||'Sin concepto'}${ves}${by}</div><div style="font-size:11px;color:var(--dim)">${new Date(i.date).toLocaleDateString('es')}</div></div>${del}</div>`}).join('')}</div>`}
  const bsIncBtn=tasaBCV?`<button class="currency-btn" style="${incomeCurrency==='ves'?'background:var(--orange);border-color:var(--orange)':''}" onclick="setIncCurrency('ves')">🇻🇪 Bs.</button>`:'';
  return`<div style="padding:0 16px"><h3 style="font-size:16px;color:var(--text2);margin:8px 0 16px">Registrar Ingreso</h3><div style="margin-bottom:12px"><label class="label-sm">Moneda</label><div class="currency-toggle"><button class="currency-btn" style="${incomeCurrency==='usd'?'background:var(--green);border-color:var(--green)':''}" onclick="setIncCurrency('usd')">🇺🇸 USD</button><button class="currency-btn" style="${incomeCurrency==='eur'?'background:rgba(45,156,219,.8);border-color:var(--blue)':''}" onclick="setIncCurrency('eur')">🇪🇺 EUR</button>${bsIncBtn}</div><label class="label-sm">Monto (${isV?'Bs.':expenseCurrency==='eur'?'EUR':'USD'})</label><input type="text" inputmode="decimal" id="incomeAmount" class="input input-big" placeholder="0.00" oninput="updateIncP()"><div id="incP"></div></div><div style="margin-bottom:16px"><label class="label-sm">Concepto</label><input type="text" id="incomeNote" class="input" placeholder="Ej: Salario, freelance..."></div><button class="btn btn-full" style="background:var(--green)" onclick="addIncome()">💵 Registrar Ingreso</button>${hist}</div>`
}
function updateIncP(){const el=document.getElementById('incP'),inp=document.getElementById('incomeAmount');if(!el||!inp?.value||!tasaBCV){if(el)el.innerHTML='';return}const a=parseFloat(inp.value);if(isNaN(a)){el.innerHTML='';return}el.innerHTML=incomeCurrency==='ves'?`<div class="conversion-preview" style="background:rgba(45,156,219,.1)"><span style="color:var(--blue)">= <strong>${formatUSD(a/tasaBCV)}</strong> <span style="color:var(--muted);font-size:12px">(tasa ${tasaBCV})</span></span></div>`:`<div class="conversion-preview" style="background:rgba(230,126,34,.1)"><span style="color:var(--orange)">≈ Bs. ${(a*tasaBCV).toFixed(2)}</span></div>`}

// ── LIMITS ──
function renderLimits(cats){
  if(!cats.length)return`<div style="padding:20px 16px;text-align:center;color:var(--muted)">Agrega categorías primero</div>`;
  return`<div style="padding:0 16px"><h3 style="font-size:16px;color:var(--text2);margin:8px 0 16px">Límites de ${mLabel()}</h3>${cats.map(c=>`<div class="limit-row"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">${c.icon}</span><span style="font-size:14px;color:var(--text)">${c.name}</span></div><button class="btn btn-sm" style="background:${c.color}30;border:1px solid ${c.color}50;color:${c.color}" onclick="openLimitModal('${c.id}')">${formatUSD(monthData.limits[c.id]||0)}</button></div>`).join('')}</div>`
}

// ── HISTORY ──
function renderHistory(){
  const sorted=[...monthData.transactions].sort((a,b)=>b.id-a.id);
  if(!sorted.length)return`<div style="padding:0 16px"><h3 style="font-size:16px;color:var(--text2);margin:8px 0 16px">Historial — ${mLabel()}</h3><div style="text-align:center;color:var(--dim);margin-top:40px;font-size:14px">Sin gastos este mes</div></div>`;
  return`<div style="padding:0 16px"><h3 style="font-size:16px;color:var(--text2);margin:8px 0 16px">Historial — ${mLabel()}</h3>${sorted.map(tx=>{const cat=getCat(tx.category);const ves=tx.originalCurrency==='ves'?`<div style="font-size:10px;color:var(--orange)">Bs.${tx.originalAmount?.toFixed(2)}@${tx.tasaUsed}</div>`:tx.originalCurrency==='eur'?`<div style="font-size:10px;color:var(--green)">€${tx.originalAmount?.toFixed(2)}</div>`:'';const by=tx.addedBy?`<span style="color:var(--purple)"> · ${tx.addedBy}</span>`:'';const del=deleteConfirmId===tx.id?`<div style="display:flex;gap:4px"><button class="btn btn-xs" style="background:var(--red)" onclick="deleteTx(${tx.id})">Sí</button><button class="btn btn-xs" style="background:rgba(255,255,255,.1)" onclick="cancelDelete()">No</button></div>`:`<button style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:4px" onclick="deleteTx(${tx.id})">🗑</button>`;return`<div class="tx-row"><div style="display:flex;align-items:center;gap:10px;flex:1"><span style="font-size:18px">${cat?.icon||'❓'}</span><div><div style="font-size:13px;font-weight:600;color:var(--text2)">${cat?.name||'Eliminada'}</div><div style="font-size:11px;color:var(--muted)">${new Date(tx.date).toLocaleDateString('es')}${tx.note?` · ${tx.note}`:''}${by}</div></div></div><div style="display:flex;align-items:center;gap:8px"><div style="text-align:right"><span style="font-size:15px;font-weight:700;color:var(--red)">-${formatUSD(tx.amount)}</span>${ves}</div>${del}</div></div>`}).join('')}</div>`
}

// ── CATEGORIES ──
function renderCategoriesView(cats){
  const list=cats.map(c=>`<div class="limit-row"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">${c.icon}</span><div><div style="font-size:14px;font-weight:600;color:var(--text2)">${c.name}</div><div style="font-size:11px;color:var(--muted)">Color: <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${c.color};vertical-align:middle"></span></div></div></div><button class="btn btn-xs" style="background:rgba(231,76,60,.15);color:var(--red);border:1px solid rgba(231,76,60,.2)" onclick="removeCategory('${c.id}')">Eliminar</button></div>`).join('');
  return`<div style="padding:0 16px"><h3 style="font-size:16px;color:var(--text2);margin:8px 0 16px">Categorías del proyecto</h3><button class="btn btn-full" style="background:var(--green);margin-bottom:16px" onclick="openAddCatModal()">➕ Agregar categoría</button>${cats.length?list:`<div style="text-align:center;color:var(--muted);margin-top:20px"><div style="font-size:28px;margin-bottom:8px">🏷️</div>No hay categorías.<br>Agrega la primera arriba.</div>`}</div>`
}

// ── CONVERTER ──
function renderConverter(){
  if(!tasaBCV)return`<div style="padding:0 16px"><h3 style="font-size:16px;color:var(--text2);margin:8px 0 16px">Conversor USD ⇄ Bs.</h3><div class="card" style="margin:0;text-align:center;color:var(--orange)">⚠️ Configura la tasa BCV primero</div></div>`;
  return`<div style="padding:0 16px"><h3 style="font-size:16px;color:var(--text2);margin:8px 0 16px">Conversor</h3><div class="card" style="margin:0 0 16px 0;text-align:center"><div style="font-size:12px;color:var(--muted)">Tasa BCV</div><div style="font-size:22px;font-weight:700;color:var(--blue)">Bs. ${tasaBCV} / USD</div></div><div style="display:flex;gap:8px;margin-bottom:16px"><button class="btn" style="flex:1;font-size:13px;background:${converterDir==='usd-to-ves'?'var(--blue)':'rgba(255,255,255,.08)'}" onclick="converterDir='usd-to-ves';renderMainContent()">USD → Bs.</button><button class="btn" style="flex:1;font-size:13px;background:${converterDir==='ves-to-usd'?'var(--blue)':'rgba(255,255,255,.08)'}" onclick="converterDir='ves-to-usd';renderMainContent()">Bs. → USD</button></div><input type="text" inputmode="decimal" id="convI" class="input" style="font-size:20px;text-align:center;margin-bottom:16px;font-weight:600" placeholder="${converterDir==='usd-to-ves'?'Monto USD':'Monto Bs.'}" oninput="updateConv()"><div id="convR"></div></div>`
}
function updateConv(){const el=document.getElementById('convR'),inp=document.getElementById('convI');if(!el||!inp?.value||!tasaBCV){if(el)el.innerHTML='';return}const a=parseFloat(inp.value);if(isNaN(a)){el.innerHTML='';return}const r=converterDir==='usd-to-ves'?`Bs. ${(a*tasaBCV).toFixed(2)}`:`$${(a/tasaBCV).toFixed(2)}`;el.innerHTML=`<div class="card" style="margin:0;text-align:center;background:linear-gradient(135deg,rgba(45,156,219,.15),rgba(45,156,219,.05))"><div style="font-size:13px;color:var(--muted);margin-bottom:4px">Equivale a</div><div style="font-size:30px;font-weight:700;color:var(--text2)">${r}</div></div>`}

// ── MEMBERS ──
function renderMembers(){
  const members=currentSpace?.members||[],code=currentSpace?.code||'------';
  return`<div style="padding:0 16px"><h3 style="font-size:16px;color:var(--text2);margin:8px 0 16px">Equipo</h3><div class="card" style="margin:0 0 16px 0;text-align:center"><div style="font-size:12px;color:var(--muted);margin-bottom:8px">Código de invitación</div><div class="space-code" onclick="copyCode()">${code}</div><div style="font-size:11px;color:var(--dim);margin-top:8px">Toca para copiar</div></div><div class="label-xs" style="color:var(--muted);margin-bottom:10px">Miembros (${members.length}/4)</div>${members.map(m=>{const me=m.uid===user?.uid,ow=m.uid===currentSpace?.ownerId;return`<div class="card" style="margin:0 0 8px 0;display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:10px"><div style="width:34px;height:34px;border-radius:50%;background:${ow?'var(--blue)':'var(--purple)'}30;display:flex;align-items:center;justify-content:center;font-size:15px">${ow?'👑':'👤'}</div><div><div style="font-size:14px;font-weight:600;color:var(--text2)">${m.name}${me?' (tú)':''}</div><div style="font-size:11px;color:var(--muted)">${m.email}</div></div></div><div style="font-size:11px;color:${ow?'var(--blue)':'var(--muted)'}">${ow?'Admin':'Miembro'}</div></div>`}).join('')}</div>`
}
