<head>

<style>
:root{--bg:#0a0a1a;--bg2:#12122a;--bg3:#0d1b2a;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.06);--text:#e0e0e0;--text2:#f0f0f0;--muted:#888;--dim:#666;--blue:#2D9CDB;--green:#27AE60;--red:#e74c3c;--orange:#e67e22;--purple:#9B51E0;--teal:#2A9D8F;--radius:12px;--radius-lg:16px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(145deg,var(--bg) 0%,var(--bg2) 50%,var(--bg3) 100%);color:var(--text);min-height:100vh;min-height:100dvh;overscroll-behavior:none}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
#app{max-width:480px;margin:0 auto;position:relative;padding-bottom:90px;min-height:100vh}
.header{padding:20px 16px 12px;border-bottom:1px solid var(--border);padding-top:max(20px,env(safe-area-inset-top,20px))}
.content{padding-top:12px;padding-bottom:20px}
.card{background:var(--card);border-radius:var(--radius-lg);padding:16px 18px;margin:0 16px 12px;border:1px solid var(--border)}
.btn{border:none;color:#fff;padding:12px 20px;border-radius:var(--radius);cursor:pointer;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .2s;-webkit-appearance:none}
.btn:hover{filter:brightness(1.1)}.btn:active{transform:scale(.97)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:6px 14px;font-size:14px}.btn-xs{padding:4px 10px;font-size:11px}
.btn-nav{padding:6px 10px;font-size:14px;background:rgba(255,255,255,0.08)}
.btn-full{width:100%;padding:14px;font-size:16px}
.input{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:12px 16px;color:var(--text2);font-size:16px;font-family:'DM Sans',sans-serif;width:100%;outline:none;-webkit-appearance:none;transition:border-color .2s}
.input:focus{border-color:rgba(45,156,219,0.5);box-shadow:0 0 0 3px rgba(45,156,219,0.1)}.input-big{font-size:24px;font-weight:700;text-align:center;padding:16px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(10,10,26,0.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:6px 2px calc(10px + env(safe-area-inset-bottom,0px));z-index:100}
.nav-tab{background:transparent;border:1px solid transparent;color:var(--dim);padding:5px 4px;border-radius:8px;cursor:pointer;font-size:9px;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;gap:1px;transition:all .2s;min-width:0}
.nav-tab.active{background:rgba(45,156,219,0.2);border-color:rgba(45,156,219,0.4);color:var(--blue)}
.nav-tab .icon{font-size:16px}
.overlay{position:fixed;inset:0;z-index:1000;background:rgba(10,10,30,0.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#1a1a2e;border-radius:20px;padding:24px 20px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto;border:1px solid rgba(255,255,255,0.08)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h2{font-size:17px;color:var(--text2);font-family:'Space Grotesk',sans-serif}
.modal-close{background:rgba(255,255,255,0.1);border:none;color:#aaa;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px}
.toast-container{position:fixed;top:max(16px,env(safe-area-inset-top,16px));right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:300px}
.toast{padding:12px 16px;border-radius:12px;color:#fff;font-size:13px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.25);animation:slideIn .3s ease}
.summary-grid{padding:0 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.progress-bar{background:rgba(255,255,255,0.06);border-radius:8px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:8px;transition:width .5s ease}
.progress-sm{height:6px;border-radius:6px}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.cat-btn{background:rgba(255,255,255,0.04);border:2px solid var(--border);border-radius:14px;padding:12px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s}
.cat-btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.12)}
.cat-btn .emoji{font-size:24px}.cat-btn .label{font-size:10px;color:var(--muted);font-weight:600;text-align:center}
.currency-toggle{display:flex;gap:8px;margin-bottom:12px}
.currency-btn{flex:1;padding:10px;font-size:14px;border-radius:var(--radius);cursor:pointer;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .2s;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.08);color:#fff}
.currency-btn:hover{background:rgba(255,255,255,0.12)}
.conversion-preview{text-align:center;margin-top:8px;font-size:14px;padding:8px 12px;border-radius:10px}
.limit-row,.tx-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;margin-bottom:8px;background:rgba(255,255,255,0.04);border-radius:12px;border:1px solid var(--border);transition:background .2s}
.limit-row:hover,.tx-row:hover{background:rgba(255,255,255,0.06)}
.tx-row{padding:14px 16px;animation:fadeIn .3s ease}
.hidden{display:none}.label-sm{font-size:12px;color:var(--muted);margin-bottom:6px;display:block}.label-xs{font-size:11px;text-transform:uppercase;letter-spacing:1px}
.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:24px}
.auth-box{width:100%;max-width:340px}
.auth-logo{font-size:48px;margin-bottom:8px}.auth-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;color:var(--text2);margin-bottom:4px}
.auth-sub{color:var(--muted);font-size:14px;margin-bottom:32px}
.auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--dim);font-size:12px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-link{color:var(--blue);cursor:pointer;font-size:14px}.auth-link:hover{text-decoration:underline}
.space-code{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;letter-spacing:6px;color:var(--blue);background:rgba(45,156,219,0.1);border:2px dashed rgba(45,156,219,0.3);border-radius:16px;padding:14px 20px;text-align:center;cursor:pointer;transition:background .2s}
.space-code:hover{background:rgba(45,156,219,0.15)}
.loading{animation:pulse 1.5s infinite;text-align:center;color:var(--muted);padding:40px}
.project-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s;background:var(--card)}
.project-card:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.1)}
.project-card:active{transform:scale(.98)}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin:8px 0}
.emoji-opt{font-size:22px;padding:6px;border-radius:8px;cursor:pointer;text-align:center;border:2px solid transparent;transition:all .15s}
.emoji-opt:hover,.emoji-opt.sel{background:rgba(255,255,255,0.1);border-color:var(--blue)}
.color-grid{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.color-opt{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.color-opt:hover,.color-opt.sel{border-color:#fff;transform:scale(1.15)}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bal-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;margin-bottom:8px;background:rgba(155,81,224,0.06);border-radius:12px;border:1px solid rgba(155,81,224,0.15)}
.bal-debt{background:rgba(45,156,219,0.06);border:1px solid rgba(45,156,219,0.15);border-radius:12px;padding:12px 16px;margin-bottom:8px}
.usdt-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;margin-bottom:8px;background:rgba(39,174,96,0.06);border-radius:12px;border:1px solid rgba(39,174,96,0.15)}
.split-member{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;border:2px solid var(--border);background:rgba(255,255,255,0.04);transition:all .2s;margin-bottom:6px}
.split-member.sel{border-color:var(--purple);background:rgba(155,81,224,0.12)}
.disp-cur-toggle{display:inline-flex;gap:3px;background:rgba(255,255,255,0.06);border-radius:10px;padding:3px}
.disp-cur-btn{padding:3px 10px;font-size:11px;border-radius:7px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--muted);background:transparent;transition:all .2s}
.disp-cur-btn.active{background:var(--blue);color:#fff}
.auto-tasa-btn{background:rgba(39,174,96,0.15);border:1px solid rgba(39,174,96,0.3);color:var(--green);padding:10px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;width:100%;margin-bottom:10px;transition:all .2s}
.auto-tasa-btn:hover{background:rgba(39,174,96,0.25)}
.auto-tasa-btn:disabled{opacity:.5;cursor:not-allowed}

/* DESKTOP 768px+ */
.desktop-sidebar{display:none}
@media(min-width:768px){
  #app{max-width:100% !important;padding-bottom:0 !important}
  #mainContent.desktop-main{display:flex;flex-direction:column;min-height:100vh;width:100%}
  .desktop-sidebar .sidebar-tab{display:flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;border-radius:8px;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--dim);font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap;flex-shrink:0}
  .desktop-sidebar .sidebar-tab:hover{background:rgba(255,255,255,0.05);color:var(--text)}
  .desktop-sidebar .sidebar-tab.active{background:rgba(45,156,219,0.15);border-color:rgba(45,156,219,0.3);color:var(--blue)}
  .desktop-sidebar .sidebar-tab .s-icon{font-size:16px}
  #mainContent.desktop-main>.desktop-right{display:flex;flex-direction:column;width:100%;min-height:100vh}
  #mainContent.desktop-main .header{padding:14px 32px 10px;border-bottom:none;flex-shrink:0}
  #mainContent.desktop-main .desktop-sidebar{display:flex;flex-direction:row;align-items:center;gap:2px;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border);padding:0 32px;height:46px;flex-shrink:0;overflow-x:auto}
  #mainContent.desktop-main .content{padding:24px 0 32px;overflow-y:auto;flex:1;max-width:900px;margin:0 auto;width:100%}
  #mainContent.desktop-main .bottom-nav{display:none !important}
  .card{margin:0 0 14px 0;padding:20px 22px}
  .summary-grid{padding:0;gap:14px}
  .cat-grid{grid-template-columns:repeat(5,1fr);gap:12px}
  .cat-btn{padding:14px 8px}
  .cat-btn .emoji{font-size:26px}
  .cat-btn .label{font-size:11px}
  .auth-screen{min-height:100vh;padding:40px 24px}
  .auth-box{max-width:440px}
  .auth-title{font-size:32px}
  .auth-logo{font-size:56px}
  .project-card{padding:20px 24px}
  .project-card:active{transform:none}
  .limit-row,.tx-row{padding:16px 22px}
  .modal{max-width:520px;padding:28px 24px}
  .input-big{font-size:28px;padding:18px}
  .input{font-size:15px}
  .btn-full{padding:13px;font-size:15px}
  .spaces-screen,.projects-screen{max-width:900px;margin:0 auto;padding:40px 32px}
  .spaces-screen .card,.projects-screen .card{padding:20px 22px}
  .currency-toggle{max-width:400px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
}
@media(min-width:1200px){
  #mainContent.desktop-main .content{max-width:960px}
  .cat-grid{grid-template-columns:repeat(6,1fr)}
  .desktop-sidebar .sidebar-tab{padding:8px 20px;font-size:14px}
  .spaces-screen,.projects-screen{max-width:960px}
}
</style>
</head>
<body>
<div id="app"><div id="toasts" class="toast-container"></div><div id="mainContent"></div></div>
<div id="modalOverlay" class="overlay hidden" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><h2 id="modalTitle"></h2><button class="modal-close" onclick="closeModal()">✕</button></div><div id="modalBody"></div></div></div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
// ═══ FIREBASE CONFIG ═══
const firebaseConfig={apiKey:"AIzaSyBzu0XXwfZe3kBqK04fVLxD3oXtnycySX0",authDomain:"fina-finanzas.firebaseapp.com",projectId:"fina-finanzas",storageBucket:"fina-finanzas.firebasestorage.app",messagingSenderId:"531084619166",appId:"1:531084619166:web:b3ac7addca9c5286263a8f"};
firebase.initializeApp(firebaseConfig);const auth=firebase.auth(),db=firebase.firestore();

// ═══ CONSTANTS ═══
const DEFAULT_CATEGORIES=[
  {id:"mercado",name:"Mercado",icon:"🛒",color:"#2D9CDB"},{id:"salidas",name:"Salidas / Delivery",icon:"🍔",color:"#F2994A"},
  {id:"terapia",name:"Terapia",icon:"🧠",color:"#BB6BD9"},{id:"anita",name:"Anita",icon:"💜",color:"#9B51E0"},
  {id:"manicurista",name:"Manicurista",icon:"💅",color:"#EB5757"},{id:"regalos",name:"Regalos",icon:"🎁",color:"#F2C94C"},
  {id:"seguro",name:"Seguro Médico",icon:"🏥",color:"#27AE60"},{id:"suscripciones",name:"Suscripciones",icon:"📱",color:"#6FCF97"},
  {id:"extras",name:"Extras / Imprevistos",icon:"⚡",color:"#E0E0E0"},{id:"viajes",name:"Viajes",icon:"✈️",color:"#56CCF2"},
  {id:"internet",name:"Internet",icon:"🌐",color:"#219EBC"},{id:"estacionamientos",name:"Estacionamientos",icon:"🅿️",color:"#8D99AE"},
  {id:"pichu",name:"Pichu",icon:"🐾",color:"#E76F51"},{id:"personales",name:"Gastos Personales",icon:"🧴",color:"#F4A261"},
  {id:"ahorros",name:"Ahorros e Inversiones",icon:"💰",color:"#2A9D8F"}
];
const EMOJI_OPTIONS=["🛒","🍔","🧠","💜","💅","🎁","🏥","📱","⚡","✈️","🌐","🅿️","🐾","🧴","💰","🏠","🚗","👶","🎓","💻","🎨","🎵","📦","🔧","☕","🍷","💊","👔","📚","🎮","🏋️","🐶"];
const COLOR_OPTIONS=["#2D9CDB","#F2994A","#BB6BD9","#9B51E0","#EB5757","#F2C94C","#27AE60","#6FCF97","#56CCF2","#219EBC","#8D99AE","#E76F51","#F4A261","#2A9D8F","#E0E0E0","#FF6B6B"];
const MONTHS_ES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const PAISES={
  VE:{nombre:'Venezuela',     bandera:'🇻🇪',moneda:'VES',simbolo:'Bs.',  tipo:'ves'},
  PE:{nombre:'Perú',          bandera:'🇵🇪',moneda:'PEN',simbolo:'S/',   tipo:'local',apiCode:'PEN',decimales:2},
  CO:{nombre:'Colombia',      bandera:'🇨🇴',moneda:'COP',simbolo:'COL$', tipo:'local',apiCode:'COP',decimales:0},
  EC:{nombre:'Ecuador',       bandera:'🇪🇨',moneda:'USD',simbolo:'$',    tipo:'usd'},
  CL:{nombre:'Chile',         bandera:'🇨🇱',moneda:'CLP',simbolo:'CLP$', tipo:'local',apiCode:'CLP',decimales:0},
  PA:{nombre:'Panamá',        bandera:'🇵🇦',moneda:'USD',simbolo:'$',    tipo:'usd'},
  AR:{nombre:'Argentina',     bandera:'🇦🇷',moneda:'ARS',simbolo:'AR$',  tipo:'ars'},
  EU:{nombre:'Europa',        bandera:'🇪🇺',moneda:'EUR',simbolo:'€',    tipo:'local',apiCode:'EUR',decimales:2},
  US:{nombre:'Estados Unidos',bandera:'🇺🇸',moneda:'USD',simbolo:'$',    tipo:'usd'},
};
function getPais(){return PAISES[spaceCountry]||null}
function getMonthKey(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}
function formatUSD(n){return fmtMoney(n)}
function amtFontSize(str){return str.length>13?'13px':str.length>10?'17px':'22px'}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='';for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function projCurrency(){return currentProject?.currency||'usd'}
function fmtMoney(n){
  const d=userDisplayCurrency||projCurrency();const v=Number(n||0);const pais=getPais();
  if(d==='ves'&&tasaBCV)return`Bs. ${(v*tasaBCV).toFixed(2)}`;
  if(d==='ars'&&tasaARS)return`AR$${(v*tasaARS).toFixed(0)}`;
  if(d==='local'&&tasaLocal&&pais){const dec=pais.decimales??2;return`${pais.simbolo}${(v*tasaLocal).toFixed(dec)}`;}
  if(d==='eur'&&projCurrency()!=='eur'&&tasaBCV&&tasaEUR)return`€${(v*tasaBCV/tasaEUR).toFixed(2)}`;
  return`${d==='eur'||projCurrency()==='eur'?'€':'$'}${v.toFixed(2)}`
}

// ═══ STATE ═══
let user=null,currentSpace=null,userSpaces=[];
let currentProject=null; // {id, name, icon, shared, ownerId, categories:[...]}
let spaceProjects=[];    // all projects in space
let currentMonth=getMonthKey(new Date()),currentView='dashboard';
let monthData={limits:{},transactions:[],income:[]};
let tasaBCV=null,tasaEUR=null,tasaARS=null,tasaLocal=null,spaceCountry=null,selectedCat=null,expenseCurrency='usd',incomeCurrency='usd';
let incHistUSD=false,expHistUSD=false;
let deleteConfirmId=null,converterDir='usd-to-ves';
let userDisplayCurrency=null; // moneda preferida de visualización por usuario
let splitMode=false,splitWith={},splitType='equal',splitCustom={}; // para dividir gastos entre miembros
let unsubMonth=null,unsubSpace=null,unsubTasa=null,unsubTasaEUR=null,unsubTasaARS=null,unsubTasaLocal=null,unsubProjects=null;
let appScreen='loading'; // loading|auth|register|spaces|country|projects|main

// ═══ HELPERS ═══
function getCat(id){return(currentProject?.categories||[]).find(c=>c.id===id)}
function getSpent(catId){return monthData.transactions.filter(t=>t.category===catId).reduce((s,t)=>s+t.amount,0)}
function totalBudget(){return(currentProject?.categories||[]).reduce((s,c)=>s+(monthData.limits[c.id]||0),0)}
function totalSpent(){return monthData.transactions.reduce((s,t)=>s+t.amount,0)}
function totalIncome(){return monthData.income.reduce((s,t)=>s+t.amount,0)}
function getPct(catId){const l=monthData.limits[catId]||0;return l===0?0:Math.min((getSpent(catId)/l)*100,100)}
function getBarColor(catId){const p=getPct(catId);if(p>=90)return'#e74c3c';if(p>=75)return'#e67e22';return getCat(catId)?.color||'#2D9CDB'}
function mLabel(){const[y,m]=currentMonth.split('-');return`${MONTHS_ES[parseInt(m)-1]} ${y}`}

// ═══ TOASTS ═══
function showToast(msg,color='var(--orange)'){const el=document.getElementById('toasts'),t=document.createElement('div');t.className='toast';t.style.background=color;t.innerHTML=msg;t.onclick=()=>t.remove();el.appendChild(t);setTimeout(()=>t.remove(),4000)}
function checkAlerts(catId,spent,limit){if(limit<=0)return;const p=(spent/limit)*100,cat=getCat(catId);if(p>=90)showToast(`<strong>⚠️ 90%</strong><div style="margin-top:4px;opacity:.9">${cat.name}: ${formatUSD(spent)} de ${formatUSD(limit)}</div>`,'#c0392b');else if(p>=75)showToast(`<strong>⚠️ 75%</strong><div style="margin-top:4px;opacity:.9">${cat.name}: ${formatUSD(spent)} de ${formatUSD(limit)}</div>`)}

// ═══ SPACES ═══
async function loadUserSpaces(){try{console.log('🔍 Loading spaces for UID:',user.uid);const snap=await db.collection('spaces').where('memberUids','array-contains',user.uid).get();console.log('📦 Spaces found:',snap.size);snap.docs.forEach(d=>console.log('  Space:',d.id,d.data().name));userSpaces=snap.docs.map(d=>({id:d.id,...d.data()}))}catch(e){console.error('❌ loadUserSpaces error:',e);userSpaces=[]}appScreen='spaces';renderApp()}
async function createSpace(){const name=document.getElementById('spaceName')?.value?.trim();if(!name)return showToast('Ponle un nombre');if(userOwnsSpacesCount()>=FREE_MAX_SPACES){return openUpgradeModal('El plan gratuito permite 1 espacio propio. Actualiza para crear espacios ilimitados.')}const code=genCode();try{const ref=await db.collection('spaces').add({name,code,ownerId:user.uid,members:[{uid:user.uid,name:user.displayName||user.email,email:user.email}],memberUids:[user.uid],createdAt:firebase.firestore.FieldValue.serverTimestamp()});await loadUserSpaces();enterSpace(ref.id)}catch(e){showToast(e.message,'var(--red)')}}
async function joinProject(){
  const code=document.getElementById('joinCode')?.value?.trim()?.toUpperCase();
  if(!code||code.length!==6)return showToast('Código de 6 caracteres');
  try{
    // 1. Buscar en el índice global de códigos de proyecto
    const codeDoc=await db.collection('projectCodes').doc(code).get();
    if(!codeDoc.exists){
      // Backward compat: intentar como código de espacio
      const snap=await db.collection('spaces').where('code','==',code).get();
      if(snap.empty)return showToast('Código no encontrado','var(--red)');
      const d=snap.docs[0],data=d.data();
      if(data.memberUids?.includes(user.uid))return enterSpace(d.id);
      if(data.memberUids?.length>=4)return showToast('Espacio lleno','var(--red)');
      await d.ref.update({members:firebase.firestore.FieldValue.arrayUnion({uid:user.uid,name:user.displayName||user.email,email:user.email}),memberUids:firebase.firestore.FieldValue.arrayUnion(user.uid)});
      await loadUserSpaces();enterSpace(d.id);return;
    }
    const {spaceId,projectId}=codeDoc.data();
    // 2. Unirse al espacio si no es miembro
    const spaceRef=db.collection('spaces').doc(spaceId);
    const spaceSnap=await spaceRef.get();
    if(!spaceSnap.exists)return showToast('Espacio no encontrado','var(--red)');
    const spaceData=spaceSnap.data();
    if(spaceData.memberUids?.length>=4&&!spaceData.memberUids?.includes(user.uid))return showToast('Espacio lleno','var(--red)');
    if(!spaceData.memberUids?.includes(user.uid)){
      await spaceRef.update({members:firebase.firestore.FieldValue.arrayUnion({uid:user.uid,name:user.displayName||user.email,email:user.email}),memberUids:firebase.firestore.FieldValue.arrayUnion(user.uid)});
    }
    // 3. Unirse al proyecto específico
    const projRef=spaceRef.collection('projects').doc(projectId);
    await projRef.update({memberUids:firebase.firestore.FieldValue.arrayUnion(user.uid)});
    // 4. Navegar al espacio
    await loadUserSpaces();
    currentSpace=userSpaces.find(s=>s.id===spaceId)||{id:spaceId,...spaceData};
    appScreen='projects';attachSpaceListeners();renderApp();
    showToast('✅ Unido al proyecto','var(--green)');
  }catch(e){showToast(e.message,'var(--red)')}
}

function enterSpace(spaceId){currentSpace=userSpaces.find(s=>s.id===spaceId);if(!currentSpace)return;currentProject=null;spaceCountry=currentSpace.country||null;attachSpaceListeners();appScreen=currentSpace.country?'projects':'country';renderApp()}
function leaveToSpaces(){detachAll();currentSpace=null;currentProject=null;spaceProjects=[];appScreen='spaces';loadUserSpaces()}

async function leaveSpace(sid){if(!confirm('¿Salir de este espacio?'))return;try{const ref=db.collection('spaces').doc(sid),snap=await ref.get(),data=snap.data();const nu=data.memberUids.filter(u=>u!==user.uid),nm=data.members.filter(m=>m.uid!==user.uid);if(!nu.length)await ref.delete();else await ref.update({members:nm,memberUids:nu});if(currentSpace?.id===sid){detachAll();currentSpace=null;currentProject=null}await loadUserSpaces()}catch(e){showToast(e.message,'var(--red)')}}

// ═══ PROJECTS ═══
function attachSpaceListeners(){if(unsubSpace)unsubSpace();if(unsubProjects)unsubProjects();if(unsubTasa)unsubTasa();if(unsubTasaEUR)unsubTasaEUR();if(unsubTasaARS)unsubTasaARS();if(unsubTasaLocal)unsubTasaLocal();
  unsubSpace=db.collection('spaces').doc(currentSpace.id).onSnapshot(s=>{if(s.exists){currentSpace={id:s.id,...s.data()};spaceCountry=currentSpace.country||null;}});
  unsubTasa=db.collection('spaces').doc(currentSpace.id).collection('config').doc('tasa').onSnapshot(s=>{tasaBCV=s.exists?s.data().value:null;if(appScreen==='main')renderMainContentSafe()});
  unsubTasaEUR=db.collection('spaces').doc(currentSpace.id).collection('config').doc('tasaEUR').onSnapshot(s=>{const prev=tasaEUR;tasaEUR=s.exists?s.data().value:null;if(!s.exists&&getPais()?.tipo==='ves')fetchEURBCVAuto(true);if(prev!==tasaEUR&&appScreen==='main')renderMainContentSafe()});
  unsubTasaARS=db.collection('spaces').doc(currentSpace.id).collection('config').doc('tasaARS').onSnapshot(s=>{tasaARS=s.exists?s.data().value:null;if(appScreen==='main')renderMainContentSafe()});
  unsubTasaLocal=db.collection('spaces').doc(currentSpace.id).collection('config').doc('tasaLocal').onSnapshot(s=>{const prev=tasaLocal;tasaLocal=s.exists?s.data().value:null;if(!s.exists&&getPais()?.tipo==='local')fetchLocalRateAuto(true);if(prev!==tasaLocal&&appScreen==='main')renderMainContentSafe()});
  unsubProjects=db.collection('spaces').doc(currentSpace.id).collection('projects').onSnapshot(snap=>{
    spaceProjects=snap.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.ownerId===user.uid||(p.shared&&(!p.memberUids||p.memberUids.includes(user.uid))));
    if(currentProject){const updated=spaceProjects.find(p=>p.id===currentProject.id);if(updated)currentProject=updated}
    if(appScreen==='projects')renderApp();if(appScreen==='main')renderMainContent()
  })
}

async function createProject(){
  const name=document.getElementById('projName')?.value?.trim();
  const shared=document.getElementById('projShared')?.checked;
  if(!name)return showToast('Ponle un nombre al proyecto');
  const ownedProjects=spaceProjects.filter(p=>p.ownerId===user.uid).length;
  if(ownedProjects>=FREE_MAX_PROJECTS){return openUpgradeModal('El plan gratuito permite 3 proyectos por espacio. Actualiza para proyectos ilimitados.')}
  const currency=document.querySelector('input[name="projCur"]:checked')?.value||'usd';
  try{
    const projCode=genCode();
    const ref=await db.collection('spaces').doc(currentSpace.id).collection('projects').add({name,icon:'📂',shared:!!shared,currency,ownerId:user.uid,categories:[],code:projCode,memberUids:[user.uid],createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    if(!!shared)await db.collection('projectCodes').doc(projCode).set({spaceId:currentSpace.id,projectId:ref.id});
  }catch(e){showToast(e.message,'var(--red)')}
}

async function createGeneralProject(){
  try{
    const projCode=genCode();
    const ref=await db.collection('spaces').doc(currentSpace.id).collection('projects').add({name:'General',icon:'📊',shared:true,currency:'usd',ownerId:user.uid,categories:DEFAULT_CATEGORIES,code:projCode,memberUids:[user.uid],createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    await db.collection('projectCodes').doc(projCode).set({spaceId:currentSpace.id,projectId:ref.id});
  }catch(e){showToast(e.message,'var(--red)')}
}

async function deleteProject(pid){
  if(!confirm('¿Eliminar este proyecto y todos sus datos?'))return;
  try{
    const projRef=db.collection('spaces').doc(currentSpace.id).collection('projects').doc(pid);
    const projSnap=await projRef.get();
    const projCode=projSnap.data()?.code;
    const months=await projRef.collection('months').get();
    const batch=db.batch();months.forEach(d=>batch.delete(d.ref));
    batch.delete(projRef);
    await batch.commit();
    if(projCode)await db.collection('projectCodes').doc(projCode).delete().catch(()=>{});
    if(currentProject?.id===pid){currentProject=null;if(unsubMonth)unsubMonth();appScreen='projects';renderApp()}
  }catch(e){showToast(e.message,'var(--red)')}
}

function enterProject(pid){currentProject=spaceProjects.find(p=>p.id===pid);if(!currentProject)return;appScreen='main';currentView='dashboard';currentMonth=getMonthKey(new Date());splitMode=false;splitWith={};splitType='equal';splitCustom={};loadDisplayCurrency();subscribeToMonth();renderApp()}

// ═══ BCV AUTO-FETCH ═══
async function fetchBCVAuto(){
  const btn=document.getElementById('bcvAutoBtn');
  if(btn){btn.disabled=true;btn.textContent='⏳ Conectando...'}
  try{
    const r=await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    const tasa=data.promedio;
    if(!tasa||isNaN(tasa))throw new Error('respuesta inválida');
    const inp=document.getElementById('tasaModalInput')||document.getElementById('tasaInput');
    if(inp)inp.value=tasa.toFixed(2);
    showToast(`✓ Tasa BCV: Bs. ${tasa.toFixed(2)}`,'var(--green)');
    if(btn){btn.disabled=false;btn.textContent='✓ Tasa detectada — guarda para activar'}
  }catch(e){
    showToast('No se pudo obtener la tasa. Ingrésala manualmente.','var(--red)');
    if(btn){btn.disabled=false;btn.textContent='🔄 Reintentar'}
  }
}

async function fetchEURBCVAuto(silent=false){
  const btn=document.getElementById('eurAutoBtn');
  if(btn){btn.disabled=true;btn.textContent='⏳ Conectando...'}
  try{
    const r=await fetch('https://bcvapi.tech/api/v1/euro/public');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    const tasa=data.tasa;
    if(!tasa||isNaN(tasa))throw new Error('respuesta inválida');
    if(currentSpace)await db.collection('spaces').doc(currentSpace.id).collection('config').doc('tasaEUR').set({value:parseFloat(tasa.toFixed(2))});
    if(!silent)showToast(`✓ Tasa EUR: Bs. ${tasa.toFixed(2)}`,'var(--green)');
    if(btn){btn.disabled=false;btn.textContent='✓ Actualizado'}
  }catch(e){
    if(!silent)showToast('No se pudo obtener tasa EUR','var(--red)');
    if(btn){btn.disabled=false;btn.textContent='🔄 Reintentar'}
  }
}

  try{
    await db.collection('spaces').doc(currentSpace.id).update({country:code});
    currentSpace={...currentSpace,country:code};spaceCountry=code;
    const pais=PAISES[code];

    appScreen='projects';renderApp();
    showToast(`${pais?.bandera} ${pais?.nombre} configurado`,'var(--green)');
  }catch(e){showToast(e.message,'var(--red)')}
}
async function fetchLocalRateAuto(silent=false){
  const pais=getPais();if(!pais?.apiCode)return;
  const btn=document.getElementById('localAutoBtn');
  if(btn){btn.disabled=true;btn.textContent='⏳ Conectando...';}
  try{
    const r=await fetch('https://api.exchangerate-api.com/v4/latest/USD');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();const tasa=data.rates[pais.apiCode];
    if(!tasa||isNaN(tasa))throw new Error('respuesta inválida');
    if(currentSpace)await db.collection('spaces').doc(currentSpace.id).collection('config').doc('tasaLocal').set({value:parseFloat(tasa.toFixed(4)),code:pais.apiCode});
    if(!silent)showToast(`✓ ${pais.bandera} 1 USD = ${pais.simbolo}${tasa.toFixed(2)}`,'var(--green)');
    if(btn){btn.disabled=false;btn.textContent='✓ Actualizado';}
  }catch(e){
    if(!silent)showToast('No se pudo obtener tasa '+pais?.moneda,'var(--red)');
    if(btn){btn.disabled=false;btn.textContent='🔄 Reintentar';}
  }
}

function loadDisplayCurrency(){userDisplayCurrency=localStorage.getItem('fina_disp_'+(currentProject?.id||''))||projCurrency()}
function setDisplayCurrency(cur){
  if(cur==='ves'&&!tasaBCV)return showToast('Activa la tasa BCV primero');
  if(cur==='ars'&&!tasaARS)return showToast('Activa la tasa ARS primero');
  if(cur==='local'&&!tasaLocal)return showToast('Activa la tasa local primero');
  userDisplayCurrency=cur;
  localStorage.setItem('fina_disp_'+(currentProject?.id||''),cur);
  renderMainContent()
}
function dispCurToggleHTML(){
  const pais=getPais();const cur=userDisplayCurrency||projCurrency();
  // Venezuela: $USD | €EUR | Bs.
  if(!pais||pais.tipo==='ves'){
    if(!tasaBCV||projCurrency()==='eur')return'';
    const eurBtn=tasaEUR?`<button class="disp-cur-btn ${cur==='eur'?'active':''}" onclick="setDisplayCurrency('eur')">€ EUR</button>`:'';
    return`<div class="disp-cur-toggle"><button class="disp-cur-btn ${cur==='usd'?'active':''}" onclick="setDisplayCurrency('usd')">$ USD</button>${eurBtn}<button class="disp-cur-btn ${cur==='ves'?'active':''}" onclick="setDisplayCurrency('ves')">Bs.</button></div>`;
  }
  // Argentina: $USD | AR$ ARS
  if(pais.tipo==='ars'&&tasaARS)return`<div class="disp-cur-toggle"><button class="disp-cur-btn ${cur==='usd'?'active':''}" onclick="setDisplayCurrency('usd')">$ USD</button><button class="disp-cur-btn ${cur==='ars'?'active':''}" onclick="setDisplayCurrency('ars')">AR$ ARS</button></div>`;

// ═══ BALANCES ═══
function computeOwes(){
  const owes={};
  monthData.transactions.filter(t=>t.splitWith?.length&&t.paidBy).forEach(tx=>{
    const swUids=tx.splitWith.map(s=>typeof s==='object'?s.uid:s);
    const all=[tx.paidBy,...swUids].filter((v,i,a)=>a.indexOf(v)===i);
    swUids.filter(uid=>uid!==tx.paidBy).forEach(debtor=>{
      let share;
      if(tx.splitType==='amount'&&tx.splitDetails?.[debtor]!==undefined){share=tx.splitDetails[debtor];}
      else if(tx.splitType==='pct'&&tx.splitDetails?.[debtor]!==undefined){share=tx.amount*(tx.splitDetails[debtor]/100);}
      else{share=tx.amount/all.length;}
      if(!owes[debtor])owes[debtor]={};
      if(!owes[debtor][tx.paidBy])owes[debtor][tx.paidBy]=0;
      owes[debtor][tx.paidBy]+=share;
    });
  });
  // nettear deudas mutuas
  Object.keys(owes).forEach(a=>{Object.keys(owes[a]).forEach(b=>{
    if(owes[b]&&owes[b][a]){
      const diff=owes[a][b]-owes[b][a];
      if(diff>0){owes[a][b]=diff;owes[b][a]=0}else{owes[b][a]=Math.abs(diff);owes[a][b]=0}
    }
  })});
  return owes;
}
function renderBalances(){
  if(!currentProject?.shared)return`<div style="padding:20px 16px;text-align:center;color:var(--muted);margin-top:40px"><div style="font-size:32px;margin-bottom:10px">👥</div>Solo disponible en proyectos compartidos</div>`;
  const sharedTxs=monthData.transactions.filter(t=>t.splitWith?.length);
  if(!sharedTxs.length)return`<div style="padding:0 16px"><h3 style="font-size:16px;color:var(--text2);margin:8px 0 16px">⚖️ Deudas — ${mLabel()}</h3><div class="card" style="margin:0;text-align:center;color:var(--muted)"><div style="font-size:28px;margin-bottom:8px">⚖️</div>Sin gastos divididos este mes.<br><span style="font-size:13px">Usa "Dividir" al registrar un gasto.</span></div></div>`;
  const owes=computeOwes();
  const members=currentSpace?.members||[];
  const me=user.uid;
  const settled=monthData.settledDebts||[];
  let rows='';
  members.forEach(debtor=>{
    if(!owes[debtor.uid])return;
    Object.entries(owes[debtor.uid]).forEach(([credUid,amt])=>{
      if(amt<0.01)return;
      const cred=members.find(m=>m.uid===credUid);
      const isMeDebtor=debtor.uid===me;
      const isMeCred=credUid===me;
      if(!isMeDebtor&&!isMeCred)return;
      const isSettled=settled.some(s=>s.debtor===debtor.uid&&s.creditor===credUid);
      const settleBtn=isSettled
        ?`<div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--green)">✅ Deuda saldada</span><button class="btn btn-xs" style="background:rgba(255,255,255,0.07);color:var(--muted)" onclick="unsettleDebt('${debtor.uid}','${credUid}')">Reabrir</button></div>`
        :`<div style="margin-top:8px;text-align:right"><button class="btn btn-sm" style="background:rgba(39,174,96,0.18);color:var(--green);border:1px solid rgba(39,174,96,0.3)" onclick="settleDebt('${debtor.uid}','${credUid}')">✓ Marcar como saldada</button></div>`;
      rows+=`<div class="bal-debt" style="${isSettled?'opacity:.55':''}"><div style="display:flex;justify-content:space-between;align-items:center"><div><span style="font-size:13px;color:var(--text)">${isMeDebtor?'🧾 Tú debes':('🧾 '+debtor.name+' debe')}</span><span style="font-size:13px;color:var(--muted)"> a ${isMeCred?'ti':(cred?.name||credUid)}</span></div><span style="font-size:16px;font-weight:700;color:${isSettled?'var(--muted)':'var(--purple)'};">${formatUSD(amt)}</span></div>${settleBtn}</div>`;
    });
  });
  if(!rows)rows=`<div style="text-align:center;color:var(--green);font-size:14px;padding:20px">✓ Sin deudas pendientes</div>`;
  const total=sharedTxs.reduce((s,t)=>s+t.amount,0);
  return`<div style="padding:0 16px"><h3 style="font-size:16px;color:var(--text2);margin:8px 0 16px">⚖️ Deudas — ${mLabel()}</h3><div class="card" style="margin:0 0 16px 0"><div style="display:flex;justify-content:space-between;align-items:center"><div><div class="label-xs" style="color:var(--purple)">Total dividido</div><div style="font-size:20px;font-weight:700;color:var(--text2)">${formatUSD(total)}</div></div><div style="font-size:12px;color:var(--muted)">${sharedTxs.length} gasto${sharedTxs.length>1?'s':''}</div></div></div>${rows}</div>`
}

async function settleDebt(debtorUid,creditorUid){
  if(!monthData.settledDebts)monthData.settledDebts=[];
  monthData.settledDebts=monthData.settledDebts.filter(s=>!(s.debtor===debtorUid&&s.creditor===creditorUid));
  monthData.settledDebts.push({debtor:debtorUid,creditor:creditorUid,date:new Date().toISOString(),settledBy:user.uid});
  await saveMonthData();showToast('✅ Deuda marcada como saldada','var(--green)');renderMainContent()
}
async function unsettleDebt(debtorUid,creditorUid){
  monthData.settledDebts=(monthData.settledDebts||[]).filter(s=>!(s.debtor===debtorUid&&s.creditor===creditorUid));

}

async function addUSDTTransfer(){
  const toUid=document.getElementById('usdtTo')?.value||'';
  const toText=document.getElementById('usdtToText')?.value?.trim()||'';
  const toName=toUid?((currentSpace?.members||[]).find(m=>m.uid===toUid)?.name||toUid):toText;
  if(!toUid&&!toText)return showToast('Indica el destinatario');
  const amt=parseFloat(document.getElementById('usdtAmt')?.value);
  if(!amt||isNaN(amt)||amt<=0)return showToast('Monto inválido');
  const hash=document.getElementById('usdtHash')?.value?.trim()||'';
  const note=document.getElementById('usdtNote')?.value?.trim()||'';
  const net=document.getElementById('usdtNet')?.value?.trim()||'';
  const transfer={id:Date.now(),fromUid:user.uid,fromName:user.displayName||user.email,toUid,toName,amount:amt,txHash:hash,note:note+(net?` (${net})`:''),date:new Date().toISOString()};
  if(!monthData.usdt)monthData.usdt=[];
  monthData.usdt.push(transfer);
  await saveMonthData();
  showToast(`₮ ${amt} USDT enviado a ${toName}`,'var(--green)');
  renderMainContent()
}
async function addTransfer(){
  const type=document.getElementById('trfType')?.value||'';
  if(!type)return showToast('Selecciona el tipo de transferencia');
  const dir=document.getElementById('trfDir')?.value||'sent';
  const toUid=document.getElementById('trfTo')?.value||'';
  const toText=document.getElementById('trfToText')?.value?.trim()||'';
  const partnerName=toUid?((currentSpace?.members||[]).find(m=>m.uid===toUid)?.name||toUid):toText;
  if(!toUid&&!toText)return showToast(dir==='sent'?'Indica el destinatario':'Indica el emisor');
  const rawAmt=parseFloat(document.getElementById('trfAmt')?.value);
  if(!rawAmt||isNaN(rawAmt)||rawAmt<=0)return showToast('Monto inválido');
  const note=document.getElementById('trfNote')?.value?.trim()||'';
  const bank=document.getElementById('trfBank')?.value||'';
  const ref=document.getElementById('trfRef')?.value?.trim()||'';
  const phone=document.getElementById('trfPhone')?.value?.trim()||'';
  const zelleId=document.getElementById('trfZelleId')?.value?.trim()||'';
  const usdtNet=document.getElementById('trfUsdtNet')?.value||'';
  const txHash=document.getElementById('trfHash')?.value?.trim()||'';
  const dateStr=document.getElementById('trfDate')?.value;
  const date=dateStr?new Date(dateStr+'T12:00:00').toISOString():new Date().toISOString();
  const isVes=type==='ve'||type==='pagomovil';const isUsdt=type==='usdt';const isArs=type==='ars';const isLocalT=type==='local';
  const currency=isVes?'ves':isUsdt?'usdt':isArs?'ars':isLocalT?'local':'usd';
  const amtUSD=isVes&&tasaBCV?rawAmt/tasaBCV:isArs&&tasaARS?rawAmt/tasaARS:isLocalT&&tasaLocal?rawAmt/tasaLocal:rawAmt;
  const typeLabels={pagomovil:'Pago Móvil',ve:'Transf. Venezuela',usa:'Transf. EE.UU.',zelle:'Zelle',usdt:'USDT'};
  const fromUid=dir==='sent'?user.uid:toUid;
  const fromName=dir==='sent'?(user.displayName||user.email):partnerName;
  const toUidFinal=dir==='sent'?toUid:user.uid;
  const toNameFinal=dir==='sent'?partnerName:(user.displayName||user.email);
  const transfer={id:Date.now(),type,typeLabel:typeLabels[type]||type,direction:dir,fromUid,fromName,toUid:toUidFinal,toName:toNameFinal,amount:rawAmt,currency,bank,ref,phone,zelleId,usdtNet,txHash,note,date};
  if(!monthData.transfers)monthData.transfers=[];
  monthData.transfers.push(transfer);
  if(dir==='received'){
    if(document.getElementById('trfAsIncome')?.checked){
      if(isVes&&!tasaBCV)showToast('Sin tasa BCV: ingreso no convertido a USD','var(--orange)');
      else if(isArs&&!tasaARS)showToast('Sin tasa ARS: ingreso no convertido a USD','var(--orange)');
      else if(isLocalT&&!tasaLocal)showToast('Sin tasa local: ingreso no convertido a USD','var(--orange)');
      else{const incNote=(typeLabels[type]||type)+(note?` · ${note}`:'');monthData.income.push({id:Date.now()+1,amount:amtUSD,originalAmount:rawAmt,originalCurrency:currency,tasaUsed:isVes?tasaBCV:isArs?tasaARS:isLocalT?tasaLocal:null,note:incNote,date,addedBy:user.displayName||user.email});}
    }
  } else {
    const action=document.getElementById('trfAction')?.value||'none';
    if(action==='expense'){
      const catId=document.getElementById('trfExpCat')?.value;
      if(catId){
        if(isVes&&!tasaBCV)showToast('Sin tasa BCV: gasto no convertido a USD','var(--orange)');
        else if(isArs&&!tasaARS)showToast('Sin tasa ARS: gasto no convertido a USD','var(--orange)');
        else if(isLocalT&&!tasaLocal)showToast('Sin tasa local: gasto no convertido a USD','var(--orange)');
        else{const expNote=(typeLabels[type]||type)+(note?` · ${note}`:'');monthData.transactions.push({id:Date.now()+1,category:catId,amount:amtUSD,originalAmount:rawAmt,originalCurrency:currency,tasaUsed:isVes?tasaBCV:isArs?tasaARS:isLocalT?tasaLocal:null,note:expNote,date,addedBy:user.displayName||user.email,paidBy:user.uid,splitWith:[]});checkAlerts(catId,getSpent(catId),monthData.limits[catId]||0);}
      }
    } else if(action==='settle'){
      const credUid=document.getElementById('trfDebtCred')?.value;
      if(credUid){if(!monthData.settledDebts)monthData.settledDebts=[];monthData.settledDebts=monthData.settledDebts.filter(s=>!(s.debtor===user.uid&&s.creditor===credUid));monthData.settledDebts.push({debtor:user.uid,creditor:credUid,date,settledBy:user.uid});}
    }
  }
  await saveMonthData();
  showToast(`✓ Transferencia ${dir==='sent'?'enviada':'recibida'} registrada`,'var(--green)');
  renderMainContent()
}

  return`<div style="padding:0 16px"><div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0 16px"><h3 style="font-size:16px;color:var(--text2);margin:0">Historial — ${mLabel()}</h3>${_tglH}</div>${sorted.map(tx=>{const cat=getCat(tx.category);const oc=tx.originalCurrency,oa=tx.originalAmount;const _showLH=!expHistUSD&&oa!=null&&oc&&oc!=='usd';const _isEurBaseH=(projCurrency()==='eur'||spaceCountry==='EU');const _mainH=_showLH?(oc==='eur'?`€${Number(oa).toFixed(2)}`:oc==='ves'?`Bs.${Number(oa).toFixed(2)}`:oc==='ars'?`AR$${Math.round(oa)}`:(oc==='local'&&_pH)?`${_pH.simbolo}${Number(oa).toFixed(_pH.decimales??2)}`:formatUSD(tx.amount)):(_hasLH&&_isEurBaseH&&tasaLocal)?`$${(tx.amount/tasaLocal).toFixed(2)}`:formatUSD(tx.amount);const by=tx.addedBy?`<span style="color:var(--purple)"> · ${tx.addedBy}</span>`:'';const splitBadge=tx.splitWith?.length?`<span style="font-size:10px;background:rgba(155,81,224,.15);color:var(--purple);border-radius:6px;padding:1px 5px;margin-left:4px;vertical-align:middle">💸 Dividido</span>`:'';const del=deleteConfirmId===tx.id?`<div style="display:flex;gap:4px"><button class="btn btn-xs" style="background:var(--red)" onclick="deleteTx(${tx.id})">Sí</button><button class="btn btn-xs" style="background:rgba(255,255,255,.1)" onclick="cancelDelete()">No</button></div>`:`<div style="display:flex;gap:2px;flex-shrink:0"><button style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:4px" onclick="openEditTxModal(${tx.id})">✏️</button><button style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:4px" onclick="deleteTx(${tx.id})">🗑</button></div>`;return`<div class="tx-row"><div style="display:flex;align-items:center;gap:10px;flex:1"><span style="font-size:18px">${cat?.icon||'❓'}</span><div><div style="font-size:13px;font-weight:600;color:var(--text2)">${cat?.name||'Eliminada'}${splitBadge}</div><div style="font-size:11px;color:var(--muted)">${new Date(tx.date).toLocaleDateString('es')}${tx.note?` · ${tx.note}`:''}${by}</div></div></div><div style="display:flex;align-items:center;gap:8px"><div style="text-align:right"><span style="font-size:15px;font-weight:700;color:var(--red)">-${_mainH}</span></div>${del}</div></div>`}).join('')}</div>`

// ── CONVERTER ──
function renderConverter(){
  const _cp=getPais(),_ct=_cp?.tipo,_cEU=spaceCountry==='EU';
  let dirs=[];
  if(_ct==='ves'){if(tasaBCV)dirs.push({id:'usd-to-ves',lbl:'🇺🇸 USD → Bs. 🇻🇪'},{id:'ves-to-usd',lbl:'🇻🇪 Bs. → USD 🇺🇸'});if(tasaEUR)dirs.push({id:'eur-to-ves',lbl:'🇪🇺 EUR → Bs. 🇻🇪'},{id:'ves-to-eur',lbl:'🇻🇪 Bs. → EUR 🇪🇺'},{id:'usd-to-eur',lbl:'🇺🇸 USD → EUR 🇪🇺'},{id:'eur-to-usd',lbl:'🇪🇺 EUR → USD 🇺🇸'});}
  else if(_ct==='ars'){if(tasaARS)dirs.push({id:'usd-to-ars',lbl:'🇺🇸 USD → AR$ 🇦🇷'},{id:'ars-to-usd',lbl:'🇦🇷 AR$ → USD 🇺🇸'});}
  else if(_cEU){if(tasaLocal)dirs.push({id:'usd-to-local',lbl:'🇺🇸 USD → € EUR'},{id:'local-to-usd',lbl:'🇪🇺 EUR → USD 🇺🇸'});else if(tasaBCV&&tasaEUR)dirs.push({id:'usd-to-eur',lbl:'🇺🇸 USD → EUR 🇪🇺'},{id:'eur-to-usd',lbl:'🇪🇺 EUR → USD 🇺🇸'});}
  else if(_ct==='local'&&_cp){if(tasaLocal)dirs.push({id:'usd-to-local',lbl:`🇺🇸 USD → ${_cp.simbolo} ${_cp.bandera}`},{id:'local-to-usd',lbl:`${_cp.simbolo} ${_cp.bandera} → USD 🇺🇸`});}
  if(!dirs.length)return`<div style="padding:0 16px"><h3 style="font-size:16px;color:var(--text2);margin:8px 0 16px">Conversor</h3><div class="card" style="margin:0;text-align:center;color:var(--orange)">⚠️ Configura la tasa desde Inicio para usar el conversor</div></div>`;
  if(!dirs.find(d=>d.id===converterDir))converterDir=dirs[0].id;
  const isLocalIn=converterDir==='ves-to-usd'||converterDir==='ves-to-eur'||converterDir==='ars-to-usd'||converterDir==='local-to-usd';
  const isEurIn=converterDir==='eur-to-ves'||converterDir==='eur-to-usd';
  const localSym=_ct==='ves'?'Bs.':_ct==='ars'?'AR$':_cp?.simbolo||'Local';
  const placeholder=isLocalIn?`Monto ${localSym}`:isEurIn?'Monto EUR':'Monto USD';
  const rateCards=`${tasaBCV&&_ct==='ves'?`<div style="flex:1;text-align:center"><div style="font-size:11px;color:var(--muted)">🇻🇪 USD/Bs.</div><div style="font-size:18px;font-weight:700;color:var(--blue)">Bs. ${tasaBCV}</div></div>`:''}${tasaEUR&&_ct==='ves'?`<div style="flex:1;text-align:center"><div style="font-size:11px;color:var(--muted)">EUR/Bs.</div><div style="font-size:18px;font-weight:700;color:var(--green)">Bs. ${tasaEUR}</div></div>`:''}${tasaARS&&_ct==='ars'?`<div style="flex:1;text-align:center"><div style="font-size:11px;color:var(--muted)">🇦🇷 USD/AR$</div><div style="font-size:18px;font-weight:700;color:var(--purple)">AR$ ${tasaARS}</div></div>`:''}${tasaLocal&&(_ct==='local'||_cEU)?`<div style="flex:1;text-align:center"><div style="font-size:11px;color:var(--muted)">${_cp?.bandera||''} USD/${_cp?.simbolo||'Local'}</div><div style="font-size:18px;font-weight:700;color:var(--green)">${_cp?.simbolo||''} ${tasaLocal}</div></div>`:''}`;
  return`<div style="padding:0 16px"><h3 style="font-size:16px;color:var(--text2);margin:8px 0 16px">Conversor</h3><div class="card" style="margin:0 0 16px 0;display:flex;gap:16px;justify-content:center">${rateCards}</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">${dirs.map(d=>`<button class="btn" style="flex:1;min-width:140px;font-size:12px;background:${converterDir===d.id?'var(--blue)':'rgba(255,255,255,.08)'}" onclick="converterDir='${d.id}';renderMainContent()">${d.lbl}</button>`).join('')}</div><input type="text" inputmode="decimal" id="convI" class="input" style="font-size:20px;text-align:center;margin-bottom:16px;font-weight:600" placeholder="${placeholder}" oninput="updateConv()"><div id="convR"></div></div>`
}
function updateConv(){
  const el=document.getElementById('convR'),inp=document.getElementById('convI');if(!el){return}if(!inp?.value){if(el)el.innerHTML='';return}
  const a=parseFloat(inp.value);if(isNaN(a)){el.innerHTML='';return}
  let result='',color='var(--text2)';
  if(converterDir==='usd-to-ves'&&tasaBCV){result=`Bs. ${(a*tasaBCV).toFixed(2)}`;color='var(--orange)'}
  else if(converterDir==='ves-to-usd'&&tasaBCV){result=`$ ${(a/tasaBCV).toFixed(2)}`;color='var(--blue)'}
  else if(converterDir==='eur-to-ves'&&tasaEUR){result=`Bs. ${(a*tasaEUR).toFixed(2)}`;color='var(--orange)'}
  else if(converterDir==='ves-to-eur'&&tasaEUR){result=`€ ${(a/tasaEUR).toFixed(2)}`;color='var(--green)'}
  else if(converterDir==='usd-to-eur'&&tasaBCV&&tasaEUR){result=`€ ${(a*(tasaBCV/tasaEUR)).toFixed(2)}`;color='var(--green)'}
  else if(converterDir==='eur-to-usd'&&tasaBCV&&tasaEUR){result=`$ ${(a*(tasaEUR/tasaBCV)).toFixed(2)}`;color='var(--blue)'}
  else if(converterDir==='usd-to-ars'&&tasaARS){result=`AR$ ${(a*tasaARS).toFixed(0)}`;color='var(--purple)'}
  else if(converterDir==='ars-to-usd'&&tasaARS){result=`$ ${(a/tasaARS).toFixed(2)}`;color='var(--blue)'}
  else if(converterDir==='usd-to-local'&&tasaLocal){const _lp=getPais();result=`${_lp?.simbolo||''}${(a*tasaLocal).toFixed(_lp?.decimales??2)}`;color='var(--green)'}
  else if(converterDir==='local-to-usd'&&tasaLocal){result=`$ ${(a/tasaLocal).toFixed(2)}`;color='var(--blue)'}
  else{el.innerHTML=`<div class="card" style="margin:0;text-align:center;color:var(--orange)">Falta configurar tasa</div>`;return}
  el.innerHTML=`<div class="card" style="margin:0;text-align:center;background:linear-gradient(135deg,rgba(45,156,219,.15),rgba(45,156,219,.05))"><div style="font-size:13px;color:var(--muted);margin-bottom:4px">Equivale a</div><div style="font-size:30px;font-weight:700;color:${color}">${result}</div></div>`
}

}

async function regenerateProjectCode(skipConfirm=false){
  if(!skipConfirm&&!confirm('¿Generar un nuevo código para esta carpeta? El código actual dejará de funcionar.'))return;
  try{
    const oldCode=currentProject?.code;
    const newCode=genCode();
    const projRef=db.collection('spaces').doc(currentSpace.id).collection('projects').doc(currentProject.id);
    await projRef.update({code:newCode,memberUids:firebase.firestore.FieldValue.arrayUnion(user.uid)});
    if(oldCode)await db.collection('projectCodes').doc(oldCode).delete().catch(()=>{});
    await db.collection('projectCodes').doc(newCode).set({spaceId:currentSpace.id,projectId:currentProject.id});
    currentProject={...currentProject,code:newCode};
    if(!skipConfirm)showToast('🔄 Nuevo código de carpeta generado','var(--green)');
    renderMainContent();
  }catch(e){showToast(e.message,'var(--red)')}
}
async function regenerateSpaceCode(){return regenerateProjectCode()}
